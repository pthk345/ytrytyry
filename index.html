<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tower Defense 3D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --safe-b: env(safe-area-inset-bottom, 0px);
}
/* Мультяшная обводка текста - работает везде */
.outlined {
  color: #fff;
  -webkit-text-stroke: 5px #000;
  paint-order: stroke fill;
  font-weight: 900;
  font-family: 'Nunito', system-ui, sans-serif;
  line-height: 1;
}
body{
  background:#87ceeb; /* небо как фолбэк */
  overflow:hidden;
  font-family:'Nunito','SF Pro Rounded',system-ui,sans-serif;
  color:#fff;
  touch-action:none;
}
#canvas{display:block;width:100vw;height:100vh;position:fixed;top:0;left:0;z-index:0;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
.screen.hidden{display:none;}

/* ── LOADING ── */
#loading-screen{background:linear-gradient(180deg,#a8e6ff 0%,#d4f5ff 100%);}
#loading-screen .loader-title{font-size:1.6rem;font-weight:900;color:#fff;-webkit-text-stroke:4px #000;paint-order:stroke fill;text-shadow:none;margin-bottom:1.4rem;}
.progress-bar{width:min(260px,70vw);height:10px;background:rgba(255,255,255,.4);border-radius:20px;overflow:hidden;border:2px solid #fff;}
.progress-fill{height:100%;background:#f5a623;border-radius:20px;transition:width .3s;}
.progress-label{font-size:.75rem;color:rgba(255,255,255,.8);margin-top:7px;font-weight:700;}

/* ── MAIN MENU ── */
#main-menu{background:linear-gradient(180deg,#a8e6ff 0%,#c5f0ff 100%);}
#main-menu .logo{font-size:clamp(2.4rem,10vw,3.6rem);font-weight:900;color:#fff;-webkit-text-stroke:4px #000;paint-order:stroke fill;text-shadow:none;margin-bottom:.3rem;letter-spacing:-.01em;}
#main-menu .subtitle{font-size:.85rem;color:rgba(255,255,255,.85);font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:2.5rem;}
.menu-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:min(240px,72vw);padding:.9rem 1.6rem;margin:.35rem 0;
  border:3px solid #000;background:#fff;color:#222;
  font-family:inherit;font-size:1rem;font-weight:900;cursor:pointer;
  border-radius:50px;box-shadow:0 4px 0 #000;
  transition:transform .1s,box-shadow .1s;
}
.menu-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #000;}
.menu-btn.primary{background:#f5a623;color:#fff;-webkit-text-stroke:4px #000;paint-order:stroke fill;text-shadow:none;}
.menu-btn .ico{flex-shrink:0;}

/* ── CARTOON NUMBER (жирный с обводкой) ── */
.cartoon-num{
  font-family:'Nunito',system-ui,sans-serif;
  font-weight:900;
  color:#fff;
  -webkit-text-stroke: 5px #000;
  paint-order: stroke fill;
  line-height:1;
  position:relative;
}

/* ─── HUD ─── */
#hud{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:50;}
#hud.hidden{display:none;}

/* ВЕРХ-ЛЕВО: сердце большое + число, молния + число */
#hud-tl{
  position:absolute;top:12px;left:10px;
  display:flex;flex-direction:column;gap:2px;
  pointer-events:none;
}
/* Ряд 1: сердце + "20" + [синий круг] + "0/20" */
#hud-row1{display:flex;align-items:center;gap:4px;}
#hud-heart{ width:64px; height:64px; flex-shrink:0; }
#hud-lives{font-size:3.6rem;display:block;}
#hud-wave-badge{
  width:32px;height:32px;
  background:#2979ff;
  border-radius:50%;border:2.5px solid #000;
  box-shadow:0 2px 0 #000;
  display:flex;align-items:center;justify-content:center;
  margin-left:6px;flex-shrink:0;
}
#hud-wave-badge img{width:16px;height:16px; filter: brightness(3) contrast(1.5); }
#hud-gold{font-size:1rem;margin-left:4px;display:block;}

/* Ряд 2: молния + золото/ресурс */
#hud-row2{display:flex;align-items:center;gap:4px;margin-top:2px;}
#hud-bolt{
  width:50px;height:50px;
  background:url(assets/icons/ic_energy.png) center/contain no-repeat;
  /* Насыщенный жёлтый — saturate(12) даёт чистый яркий жёлтый */
  filter: sepia(1) saturate(12) hue-rotate(8deg) brightness(1.1);
}
#hud-wave-text{font-size:2.8rem;display:block;}

/* ВЕРХ-ПРАВО: X кнопка + зелёная кнопка */
#hud-tr{
  position:absolute;top:12px;right:12px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  pointer-events:auto;
}
.circ-btn{
  width:60px;height:60px;
  border-radius:50%;
  border:4px solid #000;
  outline:3px solid #fff;
  outline-offset:-7px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.5);
  transition:transform .1s,box-shadow .1s;flex-shrink:0;
}
.circ-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.5);}
.circ-btn img{width:30px;height:30px;}
#btn-exit{background:#fff;}
/* Крестик: белая кнопка, иконка покрашена в #f54242 через mask */
/* btn-exit icon handled via inline div mask */
#btn-start-wave{background:#4ac94a;}
/* Белая иконка с чёрным border на зелёном фоне */
#btn-start-wave img{ filter: brightness(3) contrast(1.5); }

/* НИЗ-ПРАВО: cam btn + speed btn */
#hud-br{
  position:absolute;
  bottom:calc(var(--panel-h,220px) + 14px);
  right:12px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  pointer-events:auto;
}
#cam-mode-btn{
  width:58px;height:58px;background:#fff;
  border-radius:50%;border:3px solid #000;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.5);
  transition:transform .1s,box-shadow .1s;
}
#cam-mode-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.5);}
#cam-mode-btn img{width:30px;height:30px; filter: brightness(0.3) contrast(2); }
#cam-mode-btn.hidden{display:none;}
#btn-speed{
  width:58px;height:58px;
  background:#f5a623;border-radius:50%;border:3px solid #000;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.5);
  transition:transform .1s,box-shadow .1s;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;
  color:#fff;-webkit-text-stroke:4px #000;paint-order:stroke fill;text-shadow:none;
}
#btn-speed:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.5);}

/* ── BOTTOM PANEL ── */
#bottom-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff5e0;
  border-radius:26px 26px 0 0;
  border:3px solid #000;border-bottom:none;
  z-index:50;padding-bottom:var(--safe-b);
  box-shadow:0 -4px 0 rgba(0,0,0,.2);
}
#bottom-panel.hidden{display:none;}

/* Табы: SHOP + TOWERS + ANIMAL в одну строку */
.tab-bar{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px 8px;
}
.tab-shop,.tab-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 16px;
  border-radius:22px;border:3px solid #000;
  font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:900;
  cursor:pointer;box-shadow:0 3px 0 #000;
  transition:transform .1s,box-shadow .1s;
  white-space:nowrap;
}
.tab-shop:active,.tab-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #000;}
.tab-shop{background:#f5a623;color:#fff;-webkit-text-stroke:4px #000;paint-order:stroke fill;text-shadow:none;}
/* ic_store.png: white fill + black border on orange — brighten grey to white, keep black outline */
.tab-shop img{width:22px;height:22px;filter:brightness(3) contrast(1.5);}
.tab-btn img{width:20px;height:20px;filter:none;}
.tab-btn{background:#fff5e0;color:#333;}
.tab-btn.active{background:#f5a623;color:#fff;-webkit-text-stroke:4px #000;paint-order:stroke fill;text-shadow:none;}
.tab-spacer{flex:1;}

.tab-content{display:none;padding:4px 10px 10px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;}
.tab-content.active{display:block;}

/* карточки юнитов */
.item-card{
  display:inline-flex;flex-direction:column;align-items:center;
  width:80px;margin-right:8px;padding:6px 4px 6px;
  background:#fff;border:3px solid #000;border-radius:18px;
  cursor:pointer;vertical-align:top;
  box-shadow:0 3px 0 #000;transition:transform .1s,box-shadow .1s;
}
.item-card:active{transform:translateY(2px);box-shadow:0 1px 0 #000;}
.item-card.selected{background:#fff3d0;border-color:#f5a623;}
.item-card.disabled{opacity:.38;pointer-events:none;}
.item-icon-wrap{width:52px;height:52px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;}
.item-icon-wrap img{width:52px;height:52px;object-fit:contain;}
.item-name{font-size:.58rem;font-weight:900;text-align:center;color:#222;white-space:normal;line-height:1.2;}
.item-cost{font-size:.65rem;font-weight:900;color:#f5a623;-webkit-text-stroke:3px #000;paint-order:stroke fill;margin-top:1px;}

/* ── TOWER INFO ── */
#tower-info{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff5e0;border-radius:28px 28px 0 0;
  border-top:3px solid #000;
  padding:16px 16px calc(16px + var(--safe-b));
  z-index:60;box-shadow:0 -4px 0 rgba(0,0,0,.15);
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);
}
#tower-info.visible{transform:translateY(0);}
#tower-info.hidden{transform:translateY(100%);}
#tower-info h3{
  font-size:1.1rem;font-weight:900;color:#222;
  text-align:center;margin-bottom:10px;
}
.ti-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.ti-stat{
  display:flex;justify-content:space-between;align-items:center;
  font-size:.75rem;font-weight:800;
  background:#fff;border:2px solid #000;padding:6px 10px;border-radius:14px;
}
.ti-stat span:last-child{font-weight:900;color:#f5a623;}
.ti-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.ti-btn{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:10px 4px;border-radius:16px;border:3px solid #000;
  font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:900;
  cursor:pointer;box-shadow:0 3px 0 #000;transition:transform .1s,box-shadow .1s;
}
.ti-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #000;}
.ti-btn img{width:18px;height:18px;}
.ti-upgrade img,.ti-sell img{filter:brightness(0) invert(1);}
.ti-upgrade{background:#4ac94a;color:#fff;-webkit-text-stroke:4px #000;paint-order:stroke fill;text-shadow:none;}
.ti-sell{background:#f5a623;color:#fff;-webkit-text-stroke:4px #000;paint-order:stroke fill;text-shadow:none;}
.ti-close{background:#fff;color:#333;}
.ti-close img{filter:none;}

/* ── WAVE NOTIFY ── */
#wave-notify{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:200;pointer-events:none;transition:opacity .5s;}
#wave-notify.hidden{opacity:0;}
#wave-notify .wn-title{font-size:clamp(2rem,9vw,3.5rem);font-weight:900;color:#fff;-webkit-text-stroke:4px #000;paint-order:stroke fill;text-shadow:none;}
#wave-notify .wn-sub{font-size:.9rem;color:rgba(255,255,255,.85);font-weight:700;margin-top:4px;}

/* ── GAME OVER / WIN ── */
#game-over-screen{background:rgba(0,0,0,.7);backdrop-filter:blur(8px);}
#game-over-screen h1{font-size:clamp(2.5rem,10vw,4rem);font-weight:900;color:#ff6b6b;-webkit-text-stroke:4px #000;paint-order:stroke fill;text-shadow:none;margin-bottom:.8rem;}
#win-screen{background:rgba(0,0,0,.7);backdrop-filter:blur(8px);}
#win-screen h1{font-size:clamp(2.5rem,10vw,4rem);font-weight:900;color:#4ac94a;-webkit-text-stroke:4px #000;paint-order:stroke fill;text-shadow:none;margin-bottom:.8rem;}
.result-info{color:rgba(255,255,255,.85);font-size:.95rem;font-weight:700;margin-bottom:1.5rem;}

/* ── TOOLTIP ── */
#tooltip{position:fixed;background:#fff;border:3px solid #000;border-radius:14px;padding:8px 12px;font-size:.75rem;z-index:300;pointer-events:none;max-width:180px;box-shadow:0 3px 0 #000;}
#tooltip.hidden{display:none;}
#tooltip h4{color:#222;margin-bottom:3px;font-weight:900;}
#tooltip p{color:#666;line-height:1.35;font-weight:700;}

/* ── EDITOR ── */
#editor-screen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;background:transparent;pointer-events:none;}
#editor-screen.hidden{display:none;}
#ed-topbar{
  display:flex;align-items:center;gap:5px;padding:7px 9px;
  background:rgba(255,245,224,.95);border-bottom:3px solid #000;
  flex-shrink:0;pointer-events:auto;overflow-x:auto;-webkit-overflow-scrolling:touch;
}
#ed-topbar::-webkit-scrollbar{display:none;}
#ed-topbar-title{font-weight:900;font-size:.85rem;color:#222;white-space:nowrap;margin-right:4px;}
.ed-btn{
  display:flex;align-items:center;justify-content:center;gap:4px;
  padding:7px 11px;border-radius:22px;border:2px solid #000;
  background:#fff;color:#222;
  font-family:'Nunito',sans-serif;font-size:.68rem;font-weight:900;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  box-shadow:0 2px 0 #000;transition:transform .1s,box-shadow .1s;
}
.ed-btn:active{transform:translateY(2px);box-shadow:none;}
.ed-btn img{width:16px;height:16px;filter:brightness(0);}
.ed-btn.gold{background:#f5a623;color:#fff;}
.ed-btn.gold img{filter:brightness(0) invert(1);}
.ed-btn.green{background:#4ac94a;color:#fff;}
.ed-btn.green img{filter:brightness(0) invert(1);}
.ed-btn.red{background:#ff6b6b;color:#fff;}
.ed-btn.red img{filter:brightness(0) invert(1);}
.ed-btn.active-on{background:#7c9eff;color:#fff;border-color:#000;}
.ed-btn.active-on img{filter:brightness(0) invert(1);}
.ed-btn.erase-on{background:#ff6b6b;color:#fff;border-color:#000;}
.ed-btn.erase-on img{filter:brightness(0) invert(1);}
.ed-spacer{flex:1;min-width:3px;}
#ed-body{display:flex;flex:1;overflow:hidden;}
#ed-palette{
  width:70px;background:rgba(255,245,224,.92);border-right:3px solid #000;
  overflow-y:auto;flex-shrink:0;padding:4px 3px;
  pointer-events:auto;-webkit-overflow-scrolling:touch;
}
#ed-palette::-webkit-scrollbar{display:none;}
.ed-cat{color:#888;font-size:.46rem;font-weight:900;text-align:center;padding:6px 0 2px;letter-spacing:.08em;text-transform:uppercase;}
.ed-tile-btn{
  display:flex;flex-direction:column;align-items:center;
  padding:5px 2px;margin-bottom:3px;
  background:#fff;border:2px solid #ddd;border-radius:12px;
  cursor:pointer;pointer-events:auto;text-align:center;
  transition:all .1s;box-shadow:0 2px 0 #ccc;
}
.ed-tile-btn:active{transform:translateY(1px);box-shadow:none;}
.ed-tile-btn.active{border-color:#f5a623;background:#fff3d0;box-shadow:0 2px 0 #f5a623;}
.ed-tile-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
.ed-tile-icon img{width:22px;height:22px;filter:none;opacity:.7;}
.ed-tile-label{font-size:.45rem;color:#888;margin-top:2px;line-height:1.2;font-weight:700;}
#ed-canvas-area{flex:1;position:relative;}
#ed-info{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(255,245,224,.9);color:#555;
  font-size:.7rem;font-weight:700;
  padding:5px 14px;border-radius:22px;pointer-events:none;z-index:10;
  white-space:nowrap;border:2px solid #000;box-shadow:0 2px 0 #000;
}

/* ── MAPS MODAL ── */
#my-maps-modal{background:rgba(0,0,0,.5);backdrop-filter:blur(8px);}
.maps-modal-inner{
  background:#fff5e0;border-radius:24px;border:3px solid #000;
  padding:22px;width:min(340px,88vw);max-height:75vh;overflow-y:auto;
  box-shadow:0 6px 0 #000;
}
.maps-modal-title{font-size:1.1rem;font-weight:900;color:#222;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.maps-modal-title img{width:24px;height:24px;filter:brightness(0);}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen" class="screen">
  <div class="loader-title">Tower Defense</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-label" id="progress-label">Loading...</div>
</div>

<!-- Main Menu -->
<div id="main-menu" class="screen hidden">
  <div class="logo">Tower Defense</div>
  <div class="subtitle">3D Strategy</div>
  <button class="menu-btn primary" id="btn-play">
    <img class="ico" src="assets/icons/ic_target.png" style="width:22px;height:22px;filter:brightness(0) invert(1)">
    Play
  </button>
  <button class="menu-btn" id="btn-maps">
    <img class="ico" src="assets/icons/ic_map.png" style="width:22px;height:22px;filter:brightness(0)">
    My Maps
  </button>
  <button class="menu-btn" id="btn-editor">
    <img class="ico" src="assets/icons/ic_settings.png" style="width:22px;height:22px;filter:brightness(0)">
    Map Editor
  </button>
</div>

<!-- HUD (поверх canvas, абсолютные позиции) -->
<div id="hud" class="hidden">

  <!-- ВЕРХ-ЛЕВО: сердце + жизни + значок волны + голд + строка молния -->
  <div id="hud-tl">
    <div id="hud-row1">
      <img id="hud-heart" src="assets/icons/ic_love.png">
      <span class="cartoon-num" id="hud-lives">20</span>
      <div id="hud-wave-badge">
        <img src="assets/icons/ic_star.png" alt="">
      </div>
      <span class="cartoon-num" id="hud-gold">0/20</span>
    </div>
    <div id="hud-row2">
      <div id="hud-bolt"></div>
      <span class="cartoon-num" id="hud-wave-text">300</span>
    </div>
  </div>

  <!-- ВЕРХ-ПРАВО: X + старт волны -->
  <div id="hud-tr">
    <button class="circ-btn" id="btn-exit">
      <img src="assets/icons/ic_close.png" style="width:28px;height:28px;">
    </button>
    <button class="circ-btn" id="btn-start-wave">
      <img src="assets/icons/ic_target.png" alt="">
    </button>
  </div>

  <!-- НИЗ-ПРАВО: режим камеры + скорость -->
  <div id="hud-br">
    <button id="cam-mode-btn" class="hidden">
      <img src="assets/icons/ic_cursor.png" alt="">
    </button>
    <button id="btn-speed">1x</button>
  </div>

  <div id="wave-info" style="display:none">Ready</div>
</div>

<!-- Bottom Panel -->
<div id="bottom-panel" class="hidden">
  <div class="tab-bar">
    <div class="tab-shop" id="tab-shop-btn">
      <img src="assets/icons/ic_store.png" alt="">
      SHOP
    </div>
    <div class="tab-btn active" data-tab="towers">TOWERS</div>
    <div class="tab-btn" data-tab="animals">ANIMAL</div>
  </div>
  <div class="tab-content active" id="tab-towers"></div>
  <div class="tab-content" id="tab-animals"></div>
</div>

<!-- Tower Info bottom sheet -->
<div id="tower-info" class="hidden">
  <h3 id="ti-name">Tower</h3>
  <div class="ti-stats">
    <div class="ti-stat"><span>Level</span><span id="ti-level">1</span></div>
    <div class="ti-stat"><span>Damage</span><span id="ti-damage">0</span></div>
    <div class="ti-stat"><span>Range</span><span id="ti-range">0</span></div>
    <div class="ti-stat"><span>Speed</span><span id="ti-speed">0</span></div>
  </div>
  <div class="ti-btns">
    <button class="ti-btn ti-upgrade" id="btn-upgrade">
      <img src="assets/icons/ic_plus.png" alt=""> Upgrade
    </button>
    <button class="ti-btn ti-sell" id="btn-sell">
      <img src="assets/icons/ic_star.png" alt="" style="filter:brightness(0) invert(1)"> Sell
    </button>
    <button class="ti-btn ti-close" id="btn-deselect">
      <img src="assets/icons/ic_close.png" alt=""> Close
    </button>
  </div>
</div>

<!-- Wave Notify -->
<div id="wave-notify" class="hidden">
  <div class="wn-title" id="wn-title">Wave 1</div>
  <div class="wn-sub" id="wn-sub">Defend!</div>
</div>

<!-- Game Over -->
<div id="game-over-screen" class="screen hidden">
  <h1>Game Over</h1>

<script type="module">
// ============================================================
// TOWER DEFENSE 3D — Full Game
// Uses Three.js r128 CDN + GLTFLoader
// ============================================================

// Dynamically load Three.js
async function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = res;
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

const BASE = (()=>{
  const l = window.location.href;
  if (l.startsWith('file://')) return './';
  return l.endsWith('/') ? l : l.substring(0, l.lastIndexOf('/')+1);
})();

function updateProgress(pct, label) {
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
}

updateProgress(5, 'Loading Three.js...');
await loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js');
updateProgress(15, 'Loading loaders...');

// GLB Loader with external texture support (Kenney colormap.png)
// Pre-loads the shared colormap texture once, then reuses it for all models

const _textureCache = {};
function loadTextureOnce(url) {
  if (_textureCache[url]) return _textureCache[url];
  const tex = new THREE.TextureLoader().load(url);
  tex.flipY = false;
  tex.magFilter = THREE.LinearFilter;
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.encoding = THREE.sRGBEncoding;
  _textureCache[url] = tex;
  return tex;
}

class GLBLoader {
  constructor(manager) { this.manager = manager; }
  
  load(url, onLoad, onProgress, onError) {
    fetch(url)
      .then(r => r.arrayBuffer())
      .then(buf => this._parse(buf, url, onLoad))
      .catch(onError || console.error);
  }

  _parse(buffer, url, onLoad) {
    const magic = new Uint32Array(buffer, 0, 1)[0];
    if (magic !== 0x46546C67) { console.error('Not a GLB file:', url); return; }
    
    let jsonChunk = null, binChunk = null;
    let offset = 12;
    const dv = new DataView(buffer);
    
    while (offset < buffer.byteLength) {
      const chunkLen = dv.getUint32(offset, true);
      const chunkType = dv.getUint32(offset + 4, true);
      offset += 8;
      if (chunkType === 0x4E4F534A) {
        jsonChunk = JSON.parse(new TextDecoder().decode(new Uint8Array(buffer, offset, chunkLen)));
      } else if (chunkType === 0x004E4942) {
        binChunk = buffer.slice(offset, offset + chunkLen);
      }
      offset += chunkLen;
    }
    
    if (!jsonChunk) { console.error('No JSON chunk in GLB'); return; }
    
    // Resolve base URL for external texture references
    const baseUrl = url.substring(0, url.lastIndexOf('/') + 1);
    const scene = this._buildScene(jsonChunk, binChunk, baseUrl);
    onLoad({ scene });
  }

  _buildScene(gltf, binChunk, baseUrl) {
    const group = new THREE.Group();
    
    // Build buffers
    const bufferViews = [];
    if (gltf.bufferViews) {
      for (const bv of gltf.bufferViews) {
        bufferViews.push(new Uint8Array(binChunk, bv.byteOffset || 0, bv.byteLength));
      }
    }

    // Build accessors
    const getAccessorData = (idx) => {
      if (idx === undefined) return null;
      const acc = gltf.accessors[idx];
      const bv = bufferViews[acc.bufferView];
      const compMap = { SCALAR:1, VEC2:2, VEC3:3, VEC4:4, MAT4:16 };
      const n = compMap[acc.type] || 1;
      const byteOffset = acc.byteOffset || 0;
      const sliced = bv.slice(byteOffset);
      if (acc.componentType === 5126) return new Float32Array(sliced.buffer, sliced.byteOffset, acc.count * n);
      if (acc.componentType === 5125) return new Uint32Array(sliced.buffer, sliced.byteOffset, acc.count * n);
      if (acc.componentType === 5123) return new Uint16Array(sliced.buffer, sliced.byteOffset, acc.count * n);
      if (acc.componentType === 5121) return new Uint8Array(sliced.buffer, sliced.byteOffset, acc.count * n);
      return null;
    };

    // Resolve textures - load external URI textures (e.g. Textures/colormap.png)
    const textures = [];
    if (gltf.textures && gltf.images) {
      for (const tex of gltf.textures) {
        const imgDef = gltf.images[tex.source];
        if (imgDef && imgDef.uri) {
          const texUrl = baseUrl + imgDef.uri;
          textures.push(loadTextureOnce(texUrl));
        } else if (imgDef && imgDef.bufferView !== undefined) {
          // Embedded image in binary chunk
          const bv = bufferViews[imgDef.bufferView];
          const blob = new Blob([bv], { type: imgDef.mimeType || 'image/png' });
          const objUrl = URL.createObjectURL(blob);
          const t = new THREE.TextureLoader().load(objUrl);
          t.flipY = false;
          t.encoding = THREE.sRGBEncoding;
          textures.push(t);
        } else {
          textures.push(null);
        }
      }
    }

    // Build materials with texture support
    const materials = [];
    if (gltf.materials) {
      for (const mat of gltf.materials) {
        const m = new THREE.MeshLambertMaterial();
        if (mat.pbrMetallicRoughness) {
          const pbr = mat.pbrMetallicRoughness;
          if (pbr.baseColorTexture !== undefined && textures[pbr.baseColorTexture.index]) {
            m.map = textures[pbr.baseColorTexture.index];
          }
          if (pbr.baseColorFactor) {
            const [r,g,b,a] = pbr.baseColorFactor;
            m.color.setRGB(r,g,b);
            if (a < 1) { m.transparent = true; m.opacity = a; }
          }
        }
        if (mat.doubleSided) m.side = THREE.DoubleSide;
        materials.push(m);
      }
    }

    // Build meshes
    const buildMesh = (meshIdx) => {
      const mesh = gltf.meshes[meshIdx];
      const group = new THREE.Group();
      for (const prim of mesh.primitives) {
        const geo = new THREE.BufferGeometry();
        const attrs = prim.attributes;
        if (attrs.POSITION !== undefined) {
          const pos = getAccessorData(attrs.POSITION);
          if (pos) geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        }
        if (attrs.NORMAL !== undefined) {
          const nor = getAccessorData(attrs.NORMAL);
          if (nor) geo.setAttribute('normal', new THREE.BufferAttribute(nor, 3));
        }
        if (attrs.TEXCOORD_0 !== undefined) {
          const uv = getAccessorData(attrs.TEXCOORD_0);
          if (uv) geo.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
        }
        if (prim.indices !== undefined) {
          const idx = getAccessorData(prim.indices);
          if (idx) geo.setIndex(new THREE.BufferAttribute(idx, 1));
        }
        if (!geo.attributes.normal) geo.computeVertexNormals();
        const mat = (prim.material !== undefined && materials[prim.material]) 
          ? materials[prim.material] 
          : new THREE.MeshLambertMaterial({ color: 0x88aa88 });
        group.add(new THREE.Mesh(geo, mat));
      }
      return group;
    };

    // Build nodes
    const buildNode = (nodeIdx) => {
      const node = gltf.nodes[nodeIdx];
      const obj = new THREE.Group();
      obj.name = node.name || '';
      if (node.translation) obj.position.fromArray(node.translation);
      if (node.rotation) obj.quaternion.fromArray(node.rotation);
      if (node.scale) obj.scale.fromArray(node.scale);
      if (node.matrix) {
        const m = new THREE.Matrix4();
        m.fromArray(node.matrix);
        obj.applyMatrix4(m);
      }
      if (node.mesh !== undefined) obj.add(buildMesh(node.mesh));
      if (node.children) node.children.forEach(c => obj.add(buildNode(c)));
      return obj;
    };

    // Build scene
    if (gltf.scene !== undefined && gltf.scenes) {
      const sc = gltf.scenes[gltf.scene];
      if (sc.nodes) sc.nodes.forEach(n => group.add(buildNode(n)));
    } else if (gltf.nodes) {
      gltf.nodes.forEach((_, i) => group.add(buildNode(i)));
    }

    return group;
  }
}

// ============================================================
// ASSET MANAGER
// ============================================================
class AssetManager {
  constructor() {
    this.models = {};
    this.loader = new GLBLoader();
    this.total = 0;
    this.loaded = 0;
  }

  async loadAll(assets) {
    this.total = Object.keys(assets).length;
    const promises = Object.entries(assets).map(([key, path]) =>
      new Promise((res) => {
        this.loader.load(
          BASE + path,
          (gltf) => {
            this.models[key] = gltf.scene;
            this.loaded++;
            const pct = 15 + Math.round((this.loaded / this.total) * 70);
            updateProgress(pct, `Loading ${key}...`);
            res();
          },
          undefined,
          (err) => {
            console.warn(`Failed to load ${key}:`, err);
            this.models[key] = null;
            this.loaded++;
            res();
          }
        );
      })
    );
    await Promise.all(promises);
  }

  clone(key) {
    if (!this.models[key]) return null;
    return this.models[key].clone(true);
  }
}

// Pre-computed path from start to end using BFS
function computePath(grid) {
  let start = null, end = null;
  for (let r = 0; r < GRID_H; r++)
    for (let c = 0; c < GRID_W; c++) {
      if (grid[r][c] === TILE_START) start = [r,c];
      if (grid[r][c] === TILE_END) end = [r,c];
    }
  if (!start || !end) return [];
  const queue = [[...start, []]];
  const visited = new Set();
  const key = (r,c) => r+','+c;
  visited.add(key(...start));
  const walkable = [TILE_ROAD, TILE_BRIDGE, TILE_START, TILE_END];
  while (queue.length) {
    const [r,c,path] = queue.shift();
    const newPath = [...path, [r,c]];
    if (r === end[0] && c === end[1]) return newPath;
    for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = r+dr, nc = c+dc;
      if (nr<0||nr>=GRID_H||nc<0||nc>=GRID_W) continue;
      if (visited.has(key(nr,nc))) continue;
      if (!walkable.includes(grid[nr][nc])) continue;
      visited.add(key(nr,nc));
      queue.push([nr, nc, newPath]);
    }
  }
  return [];
}

function buildWave(waveNum) {
  const enemies = [];
  const isBossWave = waveNum % 5 === 0;
  const count = 5 + waveNum * 3;
  const hpMult = 1 + (waveNum - 1) * 0.3;
  const spawnInterval = Math.max(0.3, 1.5 - waveNum * 0.05);
  
  if (isBossWave) {
    enemies.push({ type:'boss', hpMult: hpMult * 2 });
  }
  
  const types = ['worker','runner','fatguy','police','engineer'];
  for (let i = 0; i < count; i++) {
    const t = types[Math.floor(Math.random() * Math.min(waveNum, types.length))];
    enemies.push({ type: t, hpMult });
  }
  
  return { enemies, spawnInterval, num: waveNum };
}

    // -0.38 = сильно опускаем горизонт, облака заполняют верхние 2/3 экрана

  dirLight.shadow.camera.right = 30;
  dirLight.shadow.camera.top = 30;
  dirLight.shadow.camera.bottom = -30;
  dirLight.shadow.bias = -0.0005;
  dirLight.shadow.normalBias = 0.02;
  dirLight.userData.persistent = true;
  scene.add(dirLight);

  const fillLight = new THREE.DirectionalLight(0x8899cc, 0.35);
  fillLight.position.set(10, 4, -8);

  scene.add(fillLight);

  const hemiLight = new THREE.HemisphereLight(0xddeeff, 0x887755, 0.3);
  hemiLight.userData.persistent = true;
  scene.add(hemiLight);

  // ── ОКЕАН: плоскость над отражением ──────────────────────────
  new THREE.TextureLoader().load('assets/ocean/ocean.png', (oceanTex) => {
    oceanTex.wrapS = oceanTex.wrapT = THREE.RepeatWrapping;
    oceanTex.repeat.set(4, 4);
    const oceanMat = new THREE.MeshBasicMaterial({
      map: oceanTex,

    });

      (GRID_W - 1) / 2 * TILE_SIZE,
      -0.012, // совпадает с MIRROR_Y
      (GRID_H - 1) / 2 * TILE_SIZE
    );

    oceanMesh.userData.persistent = true;
    scene.add(oceanMesh);
    window._oceanMesh = oceanMesh;
    window._oceanT = 0;
  });
  // ─────────────────────────────────────────────────────────────

  window.addEventListener('resize', onResize);

}

function updateCamera() {
  const x = camTarget.x + camDist * Math.sin(camElevation) * Math.sin(camAngle);
  const y = camTarget.y + camDist * Math.cos(camElevation);
  const z = camTarget.z + camDist * Math.sin(camElevation) * Math.cos(camAngle);
  camera.position.set(x, y, z);
  camera.lookAt(camTarget);
}

function onResize() {
  if (!renderer) return;
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

}

// PROVEN by vertex analysis of GLB files:
// tile-straight rot=0 → N-S road (z-axis)
// tile-straight rot=PI/2 → E-W road (x-axis)
// tile-corner-round rot=0   → connects East(x+) + South(z+)
// tile-corner-round rot=PI/2  → connects South(z+) + West(x-)   [90° CW]
// tile-corner-round rot=PI    → connects West(x-)  + North(z-)   [180°]
// tile-corner-round rot=-PI/2 → connects North(z-) + East(x+)   [90° CCW]
function getRoadTileInfo(g, r, c) {
  const W=[TILE_ROAD,TILE_BRIDGE,TILE_START,TILE_END];
  const N=r>0&&W.includes(g[r-1][c]);
  const S=r<GRID_H-1&&W.includes(g[r+1][c]);
  const Ww=c>0&&W.includes(g[r][c-1]);
  const E=c<GRID_W-1&&W.includes(g[r][c+1]);
  const cnt=(N?1:0)+(S?1:0)+(Ww?1:0)+(E?1:0);

  if((N||S)&&!(Ww||E)) return{model:'tile_straight',rot:0};
  if((Ww||E)&&!(N||S)) return{model:'tile_straight',rot:Math.PI/2};

  // Corners: rot=0→E+S, rot=PI/2→S+W, rot=PI→W+N, rot=-PI/2→N+E
  if(E&&S&&!N&&!Ww) return{model:'tile_corner_round',rot:0};
  if(S&&Ww&&!N&&!E) return{model:'tile_corner_round',rot:Math.PI/2};
  if(Ww&&N&&!S&&!E) return{model:'tile_corner_round',rot:Math.PI};
  if(N&&E&&!S&&!Ww) return{model:'tile_corner_round',rot:-Math.PI/2};

  if(cnt>=3) return{model:'tile_crossing',rot:0};
  return{model:'tile_straight',rot:0};
}

function scaleTo(obj,size) {
  const box=new THREE.Box3().setFromObject(obj);
  const sz=new THREE.Vector3(); box.getSize(sz);
  const m=Math.max(sz.x,sz.z);
  if(m>0.01){const s=size/m;obj.scale.set(s,s,s);}
}

// Rich decoration pool: trees, rocks, crystals, structures
const DECO_POOL=[
  {k:'detail_tree',w:6},{k:'detail_tree',w:6},{k:'detail_tree_large',w:4},
  {k:'detail_rocks',w:3},{k:'detail_rocks_large',w:2},
  {k:'detail_crystal',w:2},{k:'detail_crystal_large',w:1},
  {k:'wood_structure_part',w:2},{k:'detail_dirt',w:3},
];
const TREE_POOL=['tile_tree','tile_tree','tile_tree_double','tile_tree_quad','tile_tree'];
const GRASS_POOL=['tile','tile','tile','tile_bump','tile_bump','tile_dirt','tile_hill'];
const ROCK_POOL=['tile_rock','tile_crystal','tile_rock'];

// ALL non-persistent scene objects tracked here
// Lights and floor are added once in initThree and NEVER removed
let _sceneObjects = [];

function addToScene(obj) {
  scene.add(obj);
  _sceneObjects.push(obj);
}

function clearScene() {
  // Удаляем всё кроме объектов с userData.persistent = true
  const toRemove = scene.children.filter(o => !o.userData.persistent);
  toRemove.forEach(o => scene.remove(o));
  // Отражение и оверлей
  _reflGroup = null;
  window._blueOverlay = null;
  // НЕ трогаем scene.background — вызывающий код сам выставляет нужный фон
  _sceneObjects = [];
  tileObjects = [];
  tileMeshGrid = Array.from({length:GRID_H},()=>Array(GRID_W).fill(null));
  edHoverMesh = null;
  rangeRingMesh = null;
  hoverRangeRing = null;
}

function buildMap(g, customCellData) {
  clearScene();
  // Восстанавливаем небо (игровой режим)
  if (window._skyTex) scene.background = window._skyTex;
  else scene.background = new THREE.Color(0x87ceeb);

  // If customCellData provided (editor map): only render explicitly placed tiles
  // Otherwise render full DEFAULT_MAP with all grass/tree/rock tiles
  const isEditorMap = !!customCellData;

  for(let r=0;r<GRID_H;r++) for(let c=0;c<GRID_W;c++) {
    const tt=g[r][c];
    const cellKey = r+','+c;
    
    // For editor maps: skip pure GRASS cells that weren't explicitly placed
    if(isEditorMap && tt===TILE_GRASS && !customCellData[cellKey]) continue;

    let key,rot=0;

    if(tt===TILE_START)     {key='tile_spawn_round';}
    else if(tt===TILE_END)  {key='tile_end_round';}
    else if(tt===TILE_ROAD) {
      // Use custom model/rot if editor placed it, otherwise auto-detect
      if(isEditorMap && customCellData[cellKey]) {
        key=customCellData[cellKey].modelKey; rot=customCellData[cellKey].rot;
      } else {
        const i=getRoadTileInfo(g,r,c);key=i.model;rot=i.rot;
      }
    }
    else if(tt===TILE_TREE) {
      if(isEditorMap && customCellData[cellKey]) { key=customCellData[cellKey].modelKey; rot=customCellData[cellKey].rot; }
      else { key=TREE_POOL[(r*13+c*7)%TREE_POOL.length];rot=((r*3+c*11)%4)*Math.PI/2; }
    }
    else if(tt===TILE_ROCK) {
      if(isEditorMap && customCellData[cellKey]) { key=customCellData[cellKey].modelKey; rot=customCellData[cellKey].rot; }
      else { key=ROCK_POOL[(r*5+c*9)%ROCK_POOL.length];rot=((r*7+c*3)%4)*Math.PI/2; }
    }
    else {
      if(isEditorMap && customCellData[cellKey]) { key=customCellData[cellKey].modelKey; rot=customCellData[cellKey].rot; }
      else { key=GRASS_POOL[(r*3+c*7)%GRASS_POOL.length];rot=((r*5+c*9)%4)*Math.PI/2; }
    }

    let obj=assets.clone(key);
    if(!obj){
      const clr={[TILE_GRASS]:0x7bc965,[TILE_ROAD]:0xd4a76a,[TILE_TREE]:0x4a8840,
                 [TILE_ROCK]:0x9a9a8a,[TILE_START]:0xffdd44,[TILE_END]:0xff6644};
      obj=new THREE.Mesh(new THREE.BoxGeometry(0.95,0.18,0.95),
          new THREE.MeshLambertMaterial({color:clr[tt]||0x7bc965}));
    }
    scaleTo(obj,TILE_SIZE);
    obj.rotation.y=rot;
    obj.position.set(c*TILE_SIZE,0,r*TILE_SIZE);
    obj.traverse(m=>{if(m.isMesh){m.castShadow=true;m.receiveShadow=true;}});
    obj.userData={type:'tile',row:r,col:c,tileType:tt};
    addToScene(obj); tileObjects.push(obj); tileMeshGrid[r][c]=obj;
  }

  // === RICH DECORATIONS on open grass tiles (only for default maps, not editor) ===
  if(!isEditorMap) {
  const decoTotal=DECO_POOL.reduce((a,d)=>a+d.w,0);
  function pickDeco(h){
    let v=h%decoTotal,acc=0;
    for(const d of DECO_POOL){acc+=d.w;if(v<acc)return d.k;}
    return DECO_POOL[0].k;
  }

  for(let r=0;r<GRID_H;r++) for(let c=0;c<GRID_W;c++) {
    if(g[r][c]!==TILE_GRASS) continue;
    const adjRoad=[[-1,0],[1,0],[0,-1],[0,1]].some(([dr,dc])=>{
      const nr=r+dr,nc=c+dc;
      return nr>=0&&nr<GRID_H&&nc>=0&&nc<GRID_W&&[TILE_ROAD,TILE_START,TILE_END].includes(g[nr][nc]);
    });
    if(adjRoad) continue;
    const h=(r*41+c*23+r*c*7)%30;
    if(h>=13) continue;
    const mk=pickDeco(h);
    const det=assets.clone(mk);
    if(!det) continue;
    scaleTo(det,TILE_SIZE*(0.5+((h%5)*0.08)));
    det.rotation.y=(h*1.31);
    const ox=((h%7)-3)*0.06,oz=((h%5)-2)*0.06;
    det.position.set(c*TILE_SIZE+ox,0,r*TILE_SIZE+oz);
    det.traverse(m=>{if(m.isMesh){m.castShadow=true;m.receiveShadow=true;}});
    addToScene(det); tileObjects.push(det);
  }
  } // end !isEditorMap

  camTarget.set((GRID_W-1)/2*TILE_SIZE,0,(GRID_H-1)/2*TILE_SIZE);
  updateCamera();
}

let edCellData = {}; // key "r,c" -> { modelKey, rot, tileType }

function edKey(r,c){ return r+','+c; }

function buildEditorPalette() {
  const pal = document.getElementById('ed-palette');
  pal.innerHTML = '';
  let lastCat = '';
  ED_PALETTE.forEach((item,i) => {
    if(item.cat !== lastCat) {
      const hdr = document.createElement('div');
      hdr.style.cssText='color:#f5a623;font-size:0.55rem;font-weight:700;text-align:center;padding:4px 0 2px;letter-spacing:0.08em;';
      hdr.textContent = item.cat.toUpperCase();
      pal.appendChild(hdr);
      lastCat = item.cat;
    }
    const btn = document.createElement('div');
    btn.className='ed-tile-btn';
    const thumb = getThumb(item.modelKey);
    btn.innerHTML = thumb
      ? `<div class="ed-tile-icon"><img src="${thumb}" style="width:32px;height:32px;object-fit:contain;"></div><div class="ed-tile-label">${item.label}</div>`
      : `<div class="ed-tile-icon"><img src="assets/icons/ic_map.png" style="width:22px;height:22px;filter:none;opacity:.7;"></div><div class="ed-tile-label">${item.label}</div>`;
    btn.addEventListener('click',()=>{
      edSelectedTile={...item,rot:0};
      edSelectedCell=null;
      document.querySelectorAll('#ed-palette .ed-tile-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      
      document.getElementById('ed-info').textContent=`✦ ${item.label} — tap map to place  |  ↺ ↻ rotate`;
    });
    
    btn.dataset.ed=i;
    if(i===0){btn.classList.add('active');}
    pal.appendChild(btn);
  });
}

function openEditor() {
  editorActive = true;
  edCellData = {};
  editorGrid = Array.from({length:GRID_H}, ()=>Array(GRID_W).fill(TILE_GRASS));
  document.getElementById('editor-screen').style.display='flex';
  document.getElementById('main-menu').classList.add('hidden');
  buildEditorPalette();
  if(!scene) { initThree(); }

  // Прячем отражение
  if (_reflGroup) _reflGroup.visible = false;
  if (window._blueOverlay) window._blueOverlay.visible = false;

  // Шахматный пол (создаём один раз)
  if (!window._editorFloor) {
    const cv = document.createElement('canvas');
    cv.width = cv.height = 128;
    const cx = cv.getContext('2d');
    const c1 = '#4a4a4c', c2 = '#3a3a3c';
    for (let y = 0; y < 8; y++) for (let x = 0; x < 8; x++) {
      cx.fillStyle = (x + y) % 2 === 0 ? c1 : c2;
      cx.fillRect(x*16, y*16, 16, 16);
    }
    const tex = new THREE.CanvasTexture(cv);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(40, 40);
    const mat = new THREE.MeshBasicMaterial({ map: tex });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set((GRID_W-1)/2*TILE_SIZE, -0.01, (GRID_H-1)/2*TILE_SIZE);
    mesh.userData.persistent = true;
    scene.add(mesh);
    window._editorFloor = mesh;
  }

  buildEditorEmptyMap();
  gameState = 'editor';
}

function buildEditorEmptyMap() {
  clearScene();
  // Серый фон для редактора (после clearScene который его не трогает)
  scene.background = new THREE.Color(0x39393b);
  renderer.setClearColor(0x39393b, 1);
  // Показываем шахматный пол, прячем игровые объекты
  if (window._editorFloor) window._editorFloor.visible = true;
  if (window._oceanMesh)   window._oceanMesh.visible   = false;

  // Grid lines so user can see the cells
  const lineMat=new THREE.LineBasicMaterial({color:0x555555,transparent:true,opacity:0.8});
  for(let i=0;i<=GRID_W;i++){
    const pts=[new THREE.Vector3(i*TILE_SIZE-0.5,0.02,-0.5),
               new THREE.Vector3(i*TILE_SIZE-0.5,0.02,GRID_H*TILE_SIZE-0.5)];
    const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),lineMat);
    addToScene(line); tileObjects.push(line);
  }
  for(let i=0;i<=GRID_H;i++){
    const pts=[new THREE.Vector3(-0.5,0.02,i*TILE_SIZE-0.5),
               new THREE.Vector3(GRID_W*TILE_SIZE-0.5,0.02,i*TILE_SIZE-0.5)];
    const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),lineMat);
    addToScene(line); tileObjects.push(line);
  }

  // Place a single spawn tile in center as starting reference
  const cr=Math.floor(GRID_H/2), cc=Math.floor(GRID_W/2);
  editorGrid[cr][cc]=TILE_START;
  edCellData[edKey(cr,cc)]={modelKey:'tile_spawn_round',rot:0,tileType:TILE_START};
  rebuildEditorCell(cr,cc);

  camTarget.set((GRID_W-1)/2*TILE_SIZE,0,(GRID_H-1)/2*TILE_SIZE);
  camDist=22; camElevation=Math.PI/3.5;
  updateCamera();
}

function closeEditor() {
  editorActive = false;
  gameState = 'menu';
  if(edHoverMesh) { edHoverMesh.visible=false; }

  // ── Восстанавливаем небо/океан при выходе из редактора ──
  if (window._skyTex) {
    scene.background = window._skyTex;
  } else {
    scene.background = new THREE.Color(0x87ceeb);
  }
  renderer.setClearColor(0x87ceeb, 1);
  if (window._oceanMesh)   window._oceanMesh.visible   = true;
  if (window._blueOverlay) window._blueOverlay.visible  = true;
  if (_reflGroup)          _reflGroup.visible           = true;
  if (window._editorFloor) window._editorFloor.visible  = false;

  document.getElementById('editor-screen').style.display='none';
  document.getElementById('main-menu').classList.remove('hidden');
}

function editorPlaceTile(r, c) {
  if(r<0||r>=GRID_H||c<0||c>=GRID_W) return;
  const sel = edSelectedTile;
  editorGrid[r][c] = sel.type;
  edCellData[edKey(r,c)] = { modelKey: sel.modelKey, rot: sel.rot, tileType: sel.type };
  rebuildEditorCell(r, c);
  edSelectedCell = { r, c };
}

function rebuildEditorCell(r, c) {
  // Remove old tile object
  const old = tileMeshGrid[r][c];
  if(old) { scene.remove(old); tileObjects = tileObjects.filter(o=>o!==old); }

  const data = edCellData[edKey(r,c)];
  const tt = editorGrid[r][c];
  let key, rot;
  if(data) { key=data.modelKey; rot=data.rot; }
  else {
    const info = tt===TILE_ROAD ? getRoadTileInfo(editorGrid,r,c) : {model:'tile',rot:0};
    key=info.model; rot=info.rot;
  }

  let obj = assets.clone(key);
  if(!obj) {
    obj=new THREE.Mesh(new THREE.BoxGeometry(0.95,0.18,0.95),
      new THREE.MeshLambertMaterial({color:0x888888}));
  }
  scaleTo(obj, TILE_SIZE);
  obj.rotation.y = rot;
  obj.position.set(c*TILE_SIZE, 0, r*TILE_SIZE);
  obj.traverse(m=>{if(m.isMesh){m.castShadow=true;m.receiveShadow=true;}});
  obj.userData={type:'tile',row:r,col:c,tileType:tt};
  // Highlight selected cell
  if(edSelectedCell && edSelectedCell.r===r && edSelectedCell.c===c) {
    obj.traverse(m=>{if(m.isMesh&&m.material){
      m.material = m.material.clone();
      m.material.emissive = new THREE.Color(0x225522);
    }});
  }
  addToScene(obj); tileObjects.push(obj); tileMeshGrid[r][c]=obj;
}

function edRotateSelected(dir) {
  // dir: +1 = CW, -1 = CCW
  edSelectedTile.rot = (edSelectedTile.rot + dir*Math.PI/2);
  if(edSelectedCell) {
    const {r,c}=edSelectedCell;
    if(!edCellData[edKey(r,c)]) edCellData[edKey(r,c)]={modelKey:edSelectedTile.modelKey,rot:0,tileType:edSelectedTile.type};
    edCellData[edKey(r,c)].rot = edSelectedTile.rot;
    rebuildEditorCell(r,c);
  }
  document.getElementById('ed-info').textContent=`Rotation: ${Math.round(edSelectedTile.rot*180/Math.PI)}°`;
}

function saveEditorMap() {
  // Validate: must have start and end
  let hasStart = false, hasEnd = false;
  for(let r=0;r<GRID_H;r++) for(let c=0;c<GRID_W;c++) {
    if(editorGrid[r][c]===TILE_START) hasStart=true;
    if(editorGrid[r][c]===TILE_END) hasEnd=true;
  }
  if(!hasStart || !hasEnd) {
    document.getElementById('ed-info').textContent = '⚠ Map needs a Start tile (🟢) and End tile (🔴) to save!';
    return;
  }
  // Check path exists
  const testPath = computePath(editorGrid);
  if(testPath.length < 2) {
    document.getElementById('ed-info').textContent = '⚠ No valid path from Start to End! Connect them with Road tiles.';
    return;
  }

  const name = prompt('Enter map name:', 'My Map ' + (Date.now()%1000));
  if(!name) return;

  const saved = JSON.parse(localStorage.getItem('td_saved_maps') || '[]');
  saved.push({
    name,
    grid: editorGrid.map(r=>[...r]),
    cellData: {...edCellData},
    date: new Date().toLocaleDateString()
  });
  localStorage.setItem('td_saved_maps', JSON.stringify(saved));
  document.getElementById('ed-info').textContent = `✅ Map "${name}" saved! (${saved.length} maps total)`;
}

// GIZMO — 3D манипулятор

function createGizmo() {
  if(edGizmo) { scene.remove(edGizmo); edGizmo=null; edGizmoArrows=[]; }
  const g = new THREE.Group();

  // Стрелки перемещения — делаем их БОЛЬШИМИ для удобного нажатия
  const mkTranslateArrow = (color, axis) => {
    const mat = new THREE.MeshBasicMaterial({ color, depthTest:false });
    // Увеличенный shaft для удобного тапа на телефоне
    const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 1.2, 8), mat.clone());
    const head = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.4, 8), mat.clone());
    head.position.y = 0.8;
    const grp = new THREE.Group();
    grp.add(shaft); grp.add(head);
    // Невидимый большой хитбокс для удобного тапа
    const hitbox = new THREE.Mesh(
      new THREE.CylinderGeometry(0.25, 0.25, 1.6, 8),
      new THREE.MeshBasicMaterial({ visible:false, depthTest:false })
    );
    hitbox.position.y = 0.3;
    grp.add(hitbox);

    if(axis==='x') { grp.rotation.z = -Math.PI/2; grp.position.set(0.8,0,0); }
    if(axis==='y') { grp.position.set(0,0.8,0); }
    if(axis==='z') { grp.rotation.x = Math.PI/2; grp.position.set(0,0,0.8); }
    grp.userData = { gizmoAxis: axis, gizmoType: 'translate' };
    grp.traverse(m=>{ if(m.isMesh){ m.renderOrder=999; m.userData.gizmoAxis=axis; m.userData.gizmoType='translate'; } });
    edGizmoArrows.push(grp);
    return grp;
  };

  // Кольца вращения — тоже большие
  const mkRotateRing = (color, axis) => {
    const mat = new THREE.MeshBasicMaterial({ color, depthTest:false, side:THREE.DoubleSide });
    const ring = new THREE.Mesh(new THREE.TorusGeometry(1.1, 0.07, 8, 32), mat);
    // Хитбокс-тор
    const hit = new THREE.Mesh(
      new THREE.TorusGeometry(1.1, 0.2, 8, 32),
      new THREE.MeshBasicMaterial({ visible:false, depthTest:false })
    );
    const grp = new THREE.Group();
    grp.add(ring); grp.add(hit);
    if(axis==='x') grp.rotation.y = Math.PI/2;
    if(axis==='z') grp.rotation.x = Math.PI/2;
    grp.userData = { gizmoAxis: axis, gizmoType: 'rotate' };
    grp.traverse(m=>{ if(m.isMesh){ m.renderOrder=999; m.userData.gizmoAxis=axis; m.userData.gizmoType='rotate'; } });
    edGizmoArrows.push(grp);
    return grp;
  };

  const tx = mkTranslateArrow(0xff2222, 'x');
  const ty = mkTranslateArrow(0x22cc22, 'y');
  const tz = mkTranslateArrow(0x2244ff, 'z');
  const rx = mkRotateRing(0xff2222, 'x');   // Красный  = X (наклон вперёд/назад)
  const ry = mkRotateRing(0xffcc00, 'y');   // Жёлтый  = Y (горизонтальный spin) — лежит горизонтально
  const rz = mkRotateRing(0x2244ff, 'z');   // Синий   = Z (наклон вправо/влево) — стоит вертикально

  // Масштабирование — маленькие кубики на концах осей
  const mkScaleHandle = (color, axis) => {
    const mat = new THREE.MeshBasicMaterial({ color, depthTest:false });
    const cube = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.22, 0.22), mat);
    const hitbox = new THREE.Mesh(
      new THREE.BoxGeometry(0.45, 0.45, 0.45),
      new THREE.MeshBasicMaterial({ visible:false, depthTest:false })
    );
    const grp = new THREE.Group();
    grp.add(cube); grp.add(hitbox);
    if(axis==='x') grp.position.set(1.4, 0, 0);
    if(axis==='y') grp.position.set(0, 1.4, 0);
    if(axis==='z') grp.position.set(0, 0, 1.4);
    grp.userData = { gizmoAxis: axis, gizmoType: 'scale' };
    grp.traverse(m=>{ if(m.isMesh){ m.renderOrder=999; m.userData.gizmoAxis=axis; m.userData.gizmoType='scale'; } });
    edGizmoArrows.push(grp);
    return grp;
  };
  // Однородное масштабирование — белая сфера в центре
  const mkScaleUniform = () => {
    const mat = new THREE.MeshBasicMaterial({ color:0xffffff, depthTest:false });
    const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.14, 8, 8), mat);
    const hitbox = new THREE.Mesh(
      new THREE.SphereGeometry(0.35, 8, 8),
      new THREE.MeshBasicMaterial({ visible:false, depthTest:false })
    );
    const grp = new THREE.Group();
    grp.add(sphere); grp.add(hitbox);
    grp.userData = { gizmoAxis: 'all', gizmoType: 'scale' };
    grp.traverse(m=>{ if(m.isMesh){ m.renderOrder=999; m.userData.gizmoAxis='all'; m.userData.gizmoType='scale'; } });
    edGizmoArrows.push(grp);
    return grp;
  };

  const sx = mkScaleHandle(0xff2222, 'x');
  const sy = mkScaleHandle(0x22cc22, 'y');
  const sz = mkScaleHandle(0x2244ff, 'z');
  const su = mkScaleUniform();

  [tx,ty,tz,rx,ry,rz,sx,sy,sz,su].forEach(o=>g.add(o));
  scene.add(g);
  edGizmo = g;
  g.visible = false;
  updateGizmoMode();
  return g;
}

function updateGizmoMode() {
  if(!edGizmo) return;
  edGizmoArrows.forEach(a => {
    const t = a.userData.gizmoType;
    if(edGizmoMode === 'translate') a.visible = (t === 'translate');
    else if(edGizmoMode === 'rotate')    a.visible = (t === 'rotate');
    else if(edGizmoMode === 'scale')     a.visible = (t === 'scale');
    else a.visible = false;
  });
}

function updateGizmoPosition() {
  if(!edGizmo || !edSelectedFreeObj) { if(edGizmo) edGizmo.visible=false; return; }
  edGizmo.position.copy(edSelectedFreeObj.mesh.position);
  edGizmo.visible = true;
  updateGizmoMode();
}

function spawnFreeObject(worldPos) {
  const modelKey = edSelectedTile.modelKey;
  const obj = assets.clone(modelKey);
  if(!obj) return null;
  scaleTo(obj, TILE_SIZE);
  obj.position.copy(worldPos);
  obj.traverse(m=>{ if(m.isMesh){ m.castShadow=true; m.receiveShadow=true; } });
  obj.userData = { freeObj: true, modelKey, isFreeRoot: true };
  scene.add(obj);
  const fo = { mesh: obj, modelKey };
  edFreeObjects.push(fo);
  selectFreeObj(fo);
  return fo;
}

function selectFreeObj(fo) {
  edSelectedFreeObj = fo;
  // Highlight: сбрасываем предыдущий
  edFreeObjects.forEach(o => {
    o.mesh.traverse(m=>{ if(m.isMesh && m._origEmissive!==undefined) { m.material.emissive&&m.material.emissive.setHex(m._origEmissive); } });
  });
  if(fo) {
    fo.mesh.traverse(m=>{
      if(m.isMesh && m.material && m.material.emissive) {
        if(m._origEmissive===undefined) m._origEmissive = m.material.emissive.getHex();
        m.material.emissive.setHex(0x442200);
      }
    });
  }
  updateGizmoPosition();
}

function deleteFreeObj(fo) {
  if(!fo) return;
  scene.remove(fo.mesh);
  edFreeObjects = edFreeObjects.filter(o=>o!==fo);
  if(edSelectedFreeObj===fo) { edSelectedFreeObj=null; if(edGizmo) edGizmo.visible=false; }
}

// Раздельный счётчик тапов для dbl-tap
let _lastTapFo=null, _lastTapTime=0;

function handleFreePlaceClick(e) {
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();
  const mouseX = ((e.clientX-rect.left)/rect.width)*2-1;
  const mouseY = -((e.clientY-rect.top)/rect.height)*2+1;
  const mouse = new THREE.Vector2(mouseX, mouseY);
  raycaster.setFromCamera(mouse, camera);

  // 0. ERASE MODE в свободном режиме — удалить свободный объект
  if(edEraseMode) {
    const freeMeshes = [];
    edFreeObjects.forEach(fo=>fo.mesh.traverse(m=>{if(m.isMesh){ m._foRef=fo; freeMeshes.push(m); }}));
    if(freeMeshes.length > 0) {
      const hits = raycaster.intersectObjects(freeMeshes, false);
      if(hits.length > 0) {
        const fo = hits[0].object._foRef;
        if(fo) { deleteFreeObj(fo); document.getElementById('ed-info').textContent='🗑 Объект удалён'; return true; }
      }
    }
    return false;
  }

  // 1. Проверяем гизмо (самый высокий приоритет)
  if(edGizmo && edGizmo.visible) {
    const allGizmoMeshes = [];
    // Только ВИДИМЫЕ группы — иначе невидимые хитбоксы другого режима конфликтуют
    edGizmoArrows.forEach(grp=>{ if(!grp.visible) return; grp.traverse(m=>{if(m.isMesh) allGizmoMeshes.push(m);}); });
    const hits = raycaster.intersectObjects(allGizmoMeshes, false);
    if(hits.length > 0) {
      const h = hits[0].object;
      onGizmoDragStart(e, h);
      return true; // захватили гизмо
    }
  }

  // 2. Проверяем существующие свободные объекты
  const freeMeshes = [];
  edFreeObjects.forEach(fo=>fo.mesh.traverse(m=>{if(m.isMesh){ m._foRef=fo; freeMeshes.push(m); }}));
  if(freeMeshes.length > 0) {
    const hits = raycaster.intersectObjects(freeMeshes, false);
    if(hits.length > 0) {
      const fo = hits[0].object._foRef;
      if(fo) {
        // Проверяем double-tap (< 400ms)
        const now = Date.now();
        if(_lastTapFo===fo && now-_lastTapTime < 400) {
          deleteFreeObj(fo);
          _lastTapFo=null;
          document.getElementById('ed-info').textContent='🗑 Объект удалён';
        } else {
          _lastTapFo=fo; _lastTapTime=now;
          selectFreeObj(fo);
          document.getElementById('ed-info').textContent='✦ Выбран — тяни стрелки гизмо | двойной тап = удалить';
        }
        return true;
      }
    }
  }

  // 3. Ставим новый объект на землю
  const gp = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
  const pt = new THREE.Vector3();
  raycaster.ray.intersectPlane(gp, pt);
  if(pt) {
    spawnFreeObject(pt);
    document.getElementById('ed-info').textContent='✦ Объект поставлен | тяни стрелки гизмо | двойной тап = удалить';
  }
  return true;
}

function onGizmoDragStart(e, hitMesh) {
  const axis = hitMesh.userData.gizmoAxis || hitMesh.parent?.userData?.gizmoAxis;
  const type = hitMesh.userData.gizmoType || hitMesh.parent?.userData?.gizmoType;
  if(!axis || !type || !edSelectedFreeObj) return;
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();
  const ms = edSelectedFreeObj.mesh.scale;
  edGizmoDragging = {
    axis, type,
    startX: e.clientX - rect.left,
    startY: e.clientY - rect.top,
    startPos: edSelectedFreeObj.mesh.position.clone(),
    startRot: { x:edSelectedFreeObj.mesh.rotation.x, y:edSelectedFreeObj.mesh.rotation.y, z:edSelectedFreeObj.mesh.rotation.z },
    startScale: { x:ms.x, y:ms.y, z:ms.z },
  };
}

function onGizmoDragMove(e) {
  if(!edGizmoDragging || !edSelectedFreeObj) return;
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();
  const dx = (e.clientX-rect.left) - edGizmoDragging.startX;
  const dy = (e.clientY-rect.top) - edGizmoDragging.startY;
  const mesh = edSelectedFreeObj.mesh;

  if(edGizmoDragging.type === 'translate') {
    const p = edGizmoDragging.startPos.clone();
    const spd = 0.05;
    if(edGizmoDragging.axis==='x') p.x += dx*spd;
    if(edGizmoDragging.axis==='y') p.y += -dy*spd;
    if(edGizmoDragging.axis==='z') p.z += dy*spd;
    mesh.position.copy(p);
  } else if(edGizmoDragging.type === 'rotate') {
    const spd = 0.02;
    const sr = edGizmoDragging.startRot;
    if(edGizmoDragging.axis==='x') mesh.rotation.x = sr.x + dy*spd;
    if(edGizmoDragging.axis==='y') mesh.rotation.y = sr.y + dx*spd;
    if(edGizmoDragging.axis==='z') mesh.rotation.z = sr.z + dx*spd;
  } else if(edGizmoDragging.type === 'scale') {
    // Drag right/up = bigger, drag left/down = smaller
    const delta = (Math.abs(dx) > Math.abs(dy) ? dx : -dy);
    const spd = 0.008;
    const factor = Math.max(0.05, 1 + delta * spd);
    const ss = edGizmoDragging.startScale;
    if(edGizmoDragging.axis==='x')   mesh.scale.set(ss.x * factor, ss.y, ss.z);
    else if(edGizmoDragging.axis==='y') mesh.scale.set(ss.x, ss.y * factor, ss.z);
    else if(edGizmoDragging.axis==='z') mesh.scale.set(ss.x, ss.y, ss.z * factor);
    else if(edGizmoDragging.axis==='all') {
      // Однородное масштабирование — белая сфера
      const uf = Math.max(0.05, 1 + delta * spd);
      mesh.scale.set(ss.x * uf, ss.y * uf, ss.z * uf);
    }
  }
  updateGizmoPosition();
}

function onGizmoDragEnd() { edGizmoDragging = null; }

function setEraseMode(active) {
  edEraseMode = active;
  const btn = document.getElementById('ed-erase');
  if(active) {
    btn.classList.add('erase-on');
    document.getElementById('ed-info').textContent = '🗑 Режим удаления: тапни на любой объект чтобы стереть • снова нажми кнопку чтобы выйти';
    // Отключаем свободный режим при включении ластика
    if(edFreePlaceMode) {
      edFreePlaceMode = false;
      const fp = document.getElementById('ed-free-place');
      fp.style.borderColor=''; fp.style.color='';
      const gm = document.getElementById('ed-gizmo-mode');
      gm.style.display='none';
      if(edGizmo) edGizmo.visible=false;
      edSelectedFreeObj=null;
    }
  } else {
    btn.classList.remove('erase-on');
    document.getElementById('ed-info').textContent = 'Выбери тайл → тап для размещения';
  }
}

function setupEditorEvents() {

  document.getElementById('ed-rotate-ccw').addEventListener('click', ()=>edRotateSelected(-1));
  document.getElementById('btn-editor-back').addEventListener('click', closeEditor);
  document.getElementById('ed-save').addEventListener('click', saveEditorMap);
  document.getElementById('ed-erase').addEventListener('click', ()=>{ setEraseMode(!edEraseMode); });

  // Free place mode toggle
  const freePlaceBtn = document.getElementById('ed-free-place');
  const gizmoModeBtn = document.getElementById('ed-gizmo-mode');
  freePlaceBtn.addEventListener('click', ()=>{
    edFreePlaceMode = !edFreePlaceMode;
    // Выключаем ластик при входе в свободный режим
    if(edFreePlaceMode && edEraseMode) setEraseMode(false);
    freePlaceBtn.style.borderColor = edFreePlaceMode ? '#f5a623' : '';
    freePlaceBtn.style.color = edFreePlaceMode ? '#f5a623' : '';
    gizmoModeBtn.style.display = edFreePlaceMode ? 'block' : 'none';
    if(edFreePlaceMode) {
      createGizmo();
      document.getElementById('ed-info').textContent = '🎯 Свободный режим: тап = поставить | тап на объект = выбрать | двойной тап = удалить';
    } else {
      if(edGizmo) edGizmo.visible=false;
      edSelectedFreeObj=null;
      document.getElementById('ed-info').textContent = 'Выбери тайл → тап для размещения';
    }
  });

  const gizmoModeLabels = { translate:'↔ Перемещ.', rotate:'↻ Вращение', scale:'⤡ Размер' };
  const gizmoModeCycle  = { translate:'rotate', rotate:'scale', scale:'translate' };
  const gizmoModeColors = { translate:'', rotate:'#44aaff', scale:'#44ff88' };
  gizmoModeBtn.addEventListener('click', ()=>{
    edGizmoMode = gizmoModeCycle[edGizmoMode] || 'translate';
    gizmoModeBtn.textContent = gizmoModeLabels[edGizmoMode];
    gizmoModeBtn.style.color = gizmoModeColors[edGizmoMode];
    gizmoModeBtn.style.borderColor = gizmoModeColors[edGizmoMode];
    updateGizmoMode();
    updateGizmoPosition();
  });

  document.getElementById('ed-clear').addEventListener('click', ()=>{
    edCellData={};
    editorGrid=Array.from({length:GRID_H},()=>Array(TILE_GRASS).fill(TILE_GRASS));
    // Also clear free objects
    edFreeObjects.forEach(fo=>scene.remove(fo.mesh));
    edFreeObjects=[];
    edSelectedFreeObj=null;
    if(edGizmo) edGizmo.visible=false;
    editorGrid=Array.from({length:GRID_H},()=>Array(GRID_W).fill(TILE_GRASS));
    buildEditorEmptyMap();
  });
  document.getElementById('ed-play').addEventListener('click', ()=>{
    let hasStart = false, hasEnd = false;
    for(let r=0;r<GRID_H;r++) for(let c=0;c<GRID_W;c++) {
      if(editorGrid[r][c]===TILE_START) hasStart=true;
      if(editorGrid[r][c]===TILE_END) hasEnd=true;
    }
    if(!hasStart || !hasEnd) {
      document.getElementById('ed-info').textContent = '⚠ Поставь Старт 🟢 и Финиш 🔴!';
      return;
    }
    const testPath = computePath(editorGrid);
    if(testPath.length < 2) {
      document.getElementById('ed-info').textContent = '⚠ Нет пути! Соедини Старт с Финишем дорогой.';
      return;
    }
    const mapCopy = editorGrid.map(r=>[...r]);
    document.getElementById('editor-screen').style.display='none';
    editorActive=false;
    // Восстанавливаем небо/океан при старте игры из редактора
    if (window._skyTex) scene.background = window._skyTex;
    else scene.background = new THREE.Color(0x87ceeb);
    renderer.setClearColor(0x87ceeb, 1);
    if (window._oceanMesh)   window._oceanMesh.visible  = true;
    if (window._editorFloor) window._editorFloor.visible = false;
    startGame(mapCopy, edCellData);
  });
}

// PLACE TOWER
// ============================================================
function placeTower(row, col, def) {
  if (gold < def.cost) return false;
  if (grid[row][col] !== TILE_GRASS) return false;
  if (towers.find(t => t.row===row && t.col===col)) return false;
  
  gold -= def.cost;
  updateHUD();
  
  const tower = {
    id: Date.now() + Math.random(),
    row, col, def,
    level: 1,
    damage: def.damage,
    range: def.range,
    attackSpeed: def.attackSpeed,
    cooldown: 0,
    totalSpent: def.cost,
    special: def.special || null,
  };
  towers.push(tower);
  
  // 3D model
  let model = assets.clone(def.modelKey);
  if (!model) {
    const geo = new THREE.CylinderGeometry(0.25, 0.3, 0.7, 8);
    const mat = new THREE.MeshLambertMaterial({ color: def.color || 0x888888 });
    model = new THREE.Mesh(geo, mat);
  }
  
  // Scale
  const box = new THREE.Box3().setFromObject(model);
  const sz = new THREE.Vector3();
  box.getSize(sz);
  const maxDim = Math.max(sz.x, sz.y, sz.z);
  if (maxDim > 0) {
    const s = 0.7 / maxDim;
    model.scale.set(s, s, s);
  }
  
  model.position.set(col * TILE_SIZE, 0.15, row * TILE_SIZE);
  model.traverse(m => { if(m.isMesh) { m.castShadow=true; } });
  model.userData = { towerId: tower.id };
  addToScene(model);
  towerMeshes[tower.id] = model;
  
  return true;
}

function upgradeTower(tower) {
  if (tower.level >= 4) return false;
  const upg = UPGRADE_MULT[tower.level - 1];
  const cost = Math.floor(tower.def.cost * upg.cost);
  if (gold < cost) return false;
  
  gold -= cost;
  tower.totalSpent += cost;
  tower.damage = Math.floor(tower.def.damage * upg.damage);
  tower.range = tower.def.range * upg.range;
  tower.attackSpeed = tower.def.attackSpeed * upg.attackSpeed;
  tower.level++;
  
  // Visual upgrade indicator
  const mesh = towerMeshes[tower.id];
  if (mesh) {
    mesh.scale.multiplyScalar(1.1);
    // Flash
    mesh.traverse(m => {
      if (m.isMesh && m.material) {
        const orig = m.material.emissive ? m.material.emissive.clone() : new THREE.Color(0);
        if (m.material.emissive) m.material.emissive.set(0xffff00);
        setTimeout(() => { if(m.material.emissive) m.material.emissive.copy(orig); }, 300);
      }
    });
  }
  
  updateHUD();
  showTowerInfo(tower);
  return true;
}

function sellTower(tower) {
  const idx = towers.indexOf(tower);
  if (idx === -1) return;
  
  gold += Math.floor(tower.totalSpent * 0.6);
  towers.splice(idx, 1);
  
  const mesh = towerMeshes[tower.id];
  if (mesh) { scene.remove(mesh); delete towerMeshes[tower.id]; }
  
  hideTowerInfo();
  updateHUD();
}

function spawnEnemy(typeId, hpMult) {
  const def = ENEMY_DEFS.find(e => e.id === typeId) || ENEMY_DEFS[0];
  
  let model = assets.clone(def.modelKey);
  if (!model) {
    const geo = new THREE.SphereGeometry(0.25, 8, 6);
    const mat = new THREE.MeshLambertMaterial({ color: def.color });
    model = new THREE.Mesh(geo, mat);
  }
  
  const box = new THREE.Box3().setFromObject(model);
  const sz = new THREE.Vector3();
  box.getSize(sz);
  const maxDim = Math.max(sz.x, sz.y, sz.z);
  const s = (def.scale || 0.4) / maxDim;
  model.scale.set(s, s, s);
  
  // Start position
  const startCell = path[0];
  model.position.set(startCell[1] * TILE_SIZE, 0.3, startCell[0] * TILE_SIZE);
  model.traverse(m => { if(m.isMesh) m.castShadow = true; });
  addToScene(model);
  
  // Health bar (sprite)
  const hbCanvas = document.createElement('canvas');
  hbCanvas.width = 64; hbCanvas.height = 8;
  const hbCtx = hbCanvas.getContext('2d');
  const hbTex = new THREE.CanvasTexture(hbCanvas);
  const hbMat = new THREE.SpriteMaterial({ map: hbTex, depthTest: false });
  const hbSprite = new THREE.Sprite(hbMat);
  hbSprite.scale.set(0.8, 0.1, 1);
  hbSprite.position.set(0, 0.6, 0);
  model.add(hbSprite);
  
  const maxHp = def.hp * hpMult;
  const enemy = {
    id: ++enemyId,
    def, model, hbCanvas, hbCtx, hbTex, hbSprite,
    hp: maxHp, maxHp,
    speed: def.speed,
    pathIdx: 0,
    dead: false,
    reached: false,
    slowTimer: 0,
    poisonTimer: 0,
    poisonDmg: 0,
    stunTimer: 0,
  };
  
  enemies.push(enemy);
  updateHealthBar(enemy);
  return enemy;
}

function updateHealthBar(enemy) {
  const pct = Math.max(0, enemy.hp / enemy.maxHp);
  const ctx = enemy.hbCtx;
  ctx.clearRect(0, 0, 64, 8);
  ctx.fillStyle = '#333';
  ctx.fillRect(0, 0, 64, 8);
  ctx.fillStyle = pct > 0.5 ? '#2ecc71' : pct > 0.25 ? '#f39c12' : '#e74c3c';
  ctx.fillRect(1, 1, Math.floor(pct * 62), 6);
  enemy.hbTex.needsUpdate = true;
}

function damageEnemy(enemy, dmg, effect) {
  if (enemy.dead) return;
  enemy.hp -= dmg;
  updateHealthBar(enemy);
  
  if (effect === 'slow') enemy.slowTimer = Math.max(enemy.slowTimer, 2);
  if (effect === 'freeze') enemy.slowTimer = Math.max(enemy.slowTimer, 3);
  if (effect === 'poison') { enemy.poisonTimer = 5; enemy.poisonDmg = dmg * 0.1; }
  if (effect === 'stun') enemy.stunTimer = Math.max(enemy.stunTimer, 1.5);
  
  spawnHitParticle(enemy.model.position.clone(), dmg);
  
  if (enemy.hp <= 0) killEnemy(enemy);
}

function killEnemy(enemy) {
  if (enemy.dead) return;
  enemy.dead = true;
  gold += enemy.def.reward;
  updateHUD();
  spawnDeathParticles(enemy.model.position.clone());
  scene.remove(enemy.model);
}

function fireProjectile(tower, enemy) {
  const startPos = new THREE.Vector3(
    tower.col * TILE_SIZE, 0.5, tower.row * TILE_SIZE
  );
  
  const geo = new THREE.SphereGeometry(0.08, 6, 4);
  const colors = { cannon:0xffaa00, sniper:0x66aaff, machinegun:0x44ff44, freeze:0x88eeff, lightning:0xffff44 };

  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(startPos);
  addToScene(mesh);
  
  const proj = {
    mesh,
    targetId: enemy.id,
    tower,
    damage: tower.damage,
    speed: 8,
    dead: false,
  };
  projectiles.push(proj);
}

// ── ОТРАЖЕНИЕ ──────────────────────────────────────────────────

// ── ОТРАЖЕНИЕ: перевёрнутая копия тайлов карты ─────────────────
// ── ОТРАЖЕНИЕ: stencil-маска = точно по силуэту клонов ─────────────────────
const _MIRROR_Y = -0.01;
const _REFL_GAP  =  0.003;

function buildReflection() {
  if (_reflGroup) { scene.remove(_reflGroup); _reflGroup = null; }
  if (window._blueOverlay) { scene.remove(window._blueOverlay); window._blueOverlay = null; }

  const grp = new THREE.Group();

  tileObjects.forEach(obj => {
    const clone = obj.clone();
    clone.traverse(child => {
      if (!child.isMesh || !child.material) return;
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      child.material = mats.map(m => {
        const nm = m.clone();
        nm.transparent = false;
        nm.opacity = 1.0;
        nm.depthWrite = true;
        nm.side = THREE.BackSide;
        // ── STENCIL: каждый пиксель отражения пишет 1 в stencil-буфер ──
        nm.stencilWrite = true;
        nm.stencilFunc  = THREE.AlwaysStencilFunc;
        nm.stencilZPass = THREE.ReplaceStencilOp;
        nm.stencilRef   = 1;
        return nm;
      });
      if (child.material.length === 1) child.material = child.material[0];
      child.receiveShadow = false;
      child.castShadow    = false;
    });
    grp.add(clone);
  });

  grp.scale.set(1, -1, 1);
  grp.position.y = 2 * _MIRROR_Y - _REFL_GAP;
  grp.renderOrder = 1;
  _reflGroup = grp;
  scene.add(grp);

  // ── Синий оверлей с размытыми краями через canvas-градиент ──
  {
    // Текстура: полная непрозрачность до 80% от центра, затем плавное размытие к краям
    // Используем квадратный canvas с линейными градиентами по всем 4 сторонам
    const SZ = 512;
    const cv = document.createElement('canvas');
    cv.width = cv.height = SZ;
    const cx = cv.getContext('2d');

    // Сначала заливаем белым
    cx.fillStyle = 'rgba(255,255,255,1)';
    cx.fillRect(0, 0, SZ, SZ);

    // Fade зона = 20% от края (100% - 80% = 20%)
    const FADE = SZ * 0.20;

    // Накладываем 4 линейных градиента по краям через destination-out
    cx.globalCompositeOperation = 'destination-out';

    // Левый край
    const gl = cx.createLinearGradient(0, 0, FADE, 0);
    gl.addColorStop(0, 'rgba(0,0,0,1)');
    gl.addColorStop(1, 'rgba(0,0,0,0)');
    cx.fillStyle = gl; cx.fillRect(0, 0, FADE, SZ);

    // Правый край
    const gr = cx.createLinearGradient(SZ, 0, SZ - FADE, 0);
    gr.addColorStop(0, 'rgba(0,0,0,1)');
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    cx.fillStyle = gr; cx.fillRect(SZ - FADE, 0, FADE, SZ);

    // Верхний край
    const gt = cx.createLinearGradient(0, 0, 0, FADE);
    gt.addColorStop(0, 'rgba(0,0,0,1)');
    gt.addColorStop(1, 'rgba(0,0,0,0)');
    cx.fillStyle = gt; cx.fillRect(0, 0, SZ, FADE);

    // Нижний край
    const gb = cx.createLinearGradient(0, SZ, 0, SZ - FADE);
    gb.addColorStop(0, 'rgba(0,0,0,1)');
    gb.addColorStop(1, 'rgba(0,0,0,0)');
    cx.fillStyle = gb; cx.fillRect(0, SZ - FADE, SZ, FADE);

    cx.globalCompositeOperation = 'source-over';

    const fadeTex = new THREE.CanvasTexture(cv);

    const geo = new THREE.PlaneGeometry(200, 200);
    geo.rotateX(-Math.PI / 2);
    const mat = new THREE.MeshBasicMaterial({
      color: 0x4ab8e8,
      alphaMap: fadeTex,
      transparent: true,
      opacity: 0.30,
      depthWrite: false,
      stencilWrite: false,
      stencilFunc:  THREE.EqualStencilFunc,
      stencilRef:   1,
      stencilFail:  THREE.KeepStencilOp,
      stencilZFail: THREE.KeepStencilOp,
      stencilZPass: THREE.KeepStencilOp,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      (GRID_W - 1) / 2 * TILE_SIZE,
      _MIRROR_Y - _REFL_GAP / 2 + 0.005,
      (GRID_H - 1) / 2 * TILE_SIZE
    );
    mesh.renderOrder = 2;
    scene.add(mesh);
    window._blueOverlay = mesh;
  }
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;
let rangeRing = null;

function gameLoop(ts) {
  animFrameId = requestAnimationFrame(gameLoop);
  
  const dt = Math.min((ts - lastTime) / 1000, 0.1) * gameSpeed;
  lastTime = ts;

  // Анимация океана — медленный сдвиг UV
  if (window._oceanMesh && window._oceanMesh.material.map) {
    window._oceanT = (window._oceanT || 0) + 0.0003;
    window._oceanMesh.material.map.offset.set(
      Math.sin(window._oceanT * 0.7) * 0.04,
      window._oceanT * 0.5 % 1
    );
  }


  if (gameState !== 'playing') {
    renderer.render(scene, camera);
    return;
  }
  
  updateEnemies(dt);
  updateTowers(dt);
  updateProjectiles(dt);
  updateParticles(dt);
  updateWaveSpawner(dt);
  checkWaveComplete();
  
  renderer.render(scene, camera);
}

function updateEnemies(dt) {
  for (const enemy of enemies) {
    if (enemy.dead || enemy.reached) continue;
    
    if (enemy.stunTimer > 0) { enemy.stunTimer -= dt; continue; }
    
    // Status effects
    if (enemy.poisonTimer > 0) {
      enemy.poisonTimer -= dt;
      damageEnemy(enemy, enemy.poisonDmg * dt, null);
    }
    
    const speed = enemy.slowTimer > 0 ? enemy.speed * 0.4 : enemy.speed;
    if (enemy.slowTimer > 0) enemy.slowTimer -= dt;
    
    // Move along path
    if (enemy.pathIdx >= path.length - 1) {
      // Reached end
      enemy.reached = true;
      lives--;
      updateHUD();
      scene.remove(enemy.model);
      if (lives <= 0) triggerGameOver();
      continue;
    }
    
    const nextCell = path[enemy.pathIdx + 1];
    const target = new THREE.Vector3(nextCell[1] * TILE_SIZE, 0.3, nextCell[0] * TILE_SIZE);
    const dir = target.clone().sub(enemy.model.position);
    const dist = dir.length();
    
    if (dist < 0.05) {
      enemy.pathIdx++;
    } else {
      dir.normalize();
      enemy.model.position.add(dir.multiplyScalar(speed * dt));
      enemy.model.rotation.y = Math.atan2(dir.x, dir.z);
    }
  }
  
  // Clean dead/reached
  enemies = enemies.filter(e => !e.dead && !e.reached);
}

function updateTowers(dt) {
  for (const tower of towers) {
    tower.cooldown = Math.max(0, tower.cooldown - dt);
    if (tower.cooldown > 0) continue;
    
    // Find target
    const tPos = new THREE.Vector3(tower.col * TILE_SIZE, 0, tower.row * TILE_SIZE);
    let best = null, bestPathIdx = -1;
    
    for (const enemy of enemies) {
      if (enemy.dead || enemy.reached) continue;
      const dist = tPos.distanceTo(enemy.model.position);
      if (dist > tower.range) continue;
      if (enemy.pathIdx > bestPathIdx) { best = enemy; bestPathIdx = enemy.pathIdx; }
    }
    
    if (!best) continue;
    
    tower.cooldown = 1 / tower.attackSpeed;
    
    // Special: lightning chains
    if (tower.def.id === 'lightning') {
      const nearby = enemies.filter(e => !e.dead && !e.reached &&
        tPos.distanceTo(e.model.position) <= tower.range);
      const targets = nearby.slice(0, 3);
      targets.forEach(t => damageEnemy(t, tower.damage, null));
      // Visual lightning effect
      if (targets.length > 0) spawnHitParticle(targets[0].model.position.clone(), tower.damage);
    } else {
      const effect = tower.def.id === 'freeze' ? 'freeze' : 
                     (tower.special || null);
      fireProjectile(tower, best);
    }
    
    // Rotate tower toward enemy
    const mesh = towerMeshes[tower.id];
    if (mesh) {
      const dir = best.model.position.clone().sub(mesh.position);
      mesh.rotation.y = Math.atan2(dir.x, dir.z);
    }
  }
}

function updateProjectiles(dt) {
  for (const proj of projectiles) {
    if (proj.dead) continue;
    
    const enemy = enemies.find(e => e.id === proj.targetId && !e.dead && !e.reached);
    if (!enemy) {
      proj.dead = true;
      scene.remove(proj.mesh);
      continue;
    }
    
    const dir = enemy.model.position.clone().sub(proj.mesh.position);
    const dist = dir.length();
    
    if (dist < 0.2) {
      const effect = proj.tower.def.id === 'freeze' ? 'freeze' :
                     proj.tower.def.id === 'cannon' ? null : 
                     (proj.tower.special || null);
      
      // Splash for cannon
      if (proj.tower.def.id === 'cannon') {
        for (const e of enemies) {
          if (e.dead || e.reached) continue;
          if (enemy.model.position.distanceTo(e.model.position) < 1.2) {
            damageEnemy(e, proj.damage * 0.5, null);
          }
        }
        damageEnemy(enemy, proj.damage, null);
      } else {
        damageEnemy(enemy, proj.damage, effect);
      }
      
      proj.dead = true;
      scene.remove(proj.mesh);
    } else {
      dir.normalize();
      proj.mesh.position.add(dir.multiplyScalar(proj.speed * dt));
    }
  }
  
  projectiles = projectiles.filter(p => !p.dead);
}

function updateParticles(dt) {
  for (const p of particles) {
    p.life -= dt;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      continue;
    }
    p.vel.y -= 9.8 * dt;
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
    const a = p.life / p.maxLife;
    if (p.mesh.material) p.mesh.material.opacity = a;
  }
  particles = particles.filter(p => p.life > 0);
}

function updateWaveSpawner(dt) {
  if (!waveActive || spawnQueue.length === 0) return;
  
  spawnTimer -= dt;
  if (spawnTimer <= 0 && spawnQueue.length > 0) {
    const next = spawnQueue.shift();
    spawnEnemy(next.type, next.hpMult);
    spawnTimer = next.interval || 1;
  }
}

function checkWaveComplete() {
  if (!waveActive) return;
  if (spawnQueue.length > 0) return;
  if (enemies.some(e => !e.dead && !e.reached)) return;
  
  waveActive = false;
  
  document.getElementById('btn-start-wave').classList.add('primary');
  
  if (wave >= TOTAL_WAVES) {
    triggerVictory();
  } else {
    showWaveNotify(`Wave ${wave} Complete!`, `Prepare for Wave ${wave + 1}`);
    // Bonus gold
    gold += 50 + wave * 10;
    updateHUD();
  }
}

// ============================================================
// WAVE MANAGEMENT
// ============================================================
function startWave() {
  if (waveActive) return;
  if (path.length < 2) { alert('No valid path!'); return; }
  
  wave++;
  waveActive = true;
  
  const waveDef = buildWave(wave);
  const si = waveDef.spawnInterval;
  
  spawnQueue = waveDef.enemies.map(e => ({ ...e, interval: si }));
  spawnTimer = 0;
  
  
  document.getElementById('btn-start-wave').classList.remove('primary');
  
  const isBoss = wave % 5 === 0;
  showWaveNotify(`Wave ${wave}${isBoss ? ' 👹 BOSS' : ''}!`, isBoss ? 'Boss incoming!' : 'Defend your base!');
  
  updateHUD();
}

function showWaveNotify(title, sub) {
  const el = document.getElementById('wave-notify');
  document.getElementById('wn-title').textContent = title;
  document.getElementById('wn-sub').textContent = sub;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 2500);
}
