// THUMBNAIL RENDERER — рендерит 3D модель в маленький canvas
// ============================================================
function renderModelThumb(modelKey, size = 80) {
  // Offscreen Three.js сцена
  const tw = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  tw.setSize(size, size);
  tw.setPixelRatio(2);
  tw.setClearColor(0x000000, 0);
  tw.outputEncoding = THREE.sRGBEncoding;
  tw.toneMapping = THREE.ACESFilmicToneMapping;
  tw.toneMappingExposure = 0.9;

  const ts = new THREE.Scene();

  // Освещение
  ts.add(new THREE.AmbientLight(0xffffff, 0.8));
  const dl = new THREE.DirectionalLight(0xffffff, 1.2);
  dl.position.set(3, 5, 4);
  ts.add(dl);
  const fl = new THREE.DirectionalLight(0xaaccff, 0.4);
  fl.position.set(-2, 2, -3);
  ts.add(fl);

  // Модель
  const obj = assets.clone(modelKey);
  if (!obj) { tw.dispose(); return null; }

  ts.add(obj);

  // Масштаб
  const box = new THREE.Box3().setFromObject(obj);
  const bsz = new THREE.Vector3();
  box.getSize(bsz);
  const bc = new THREE.Vector3();
  box.getCenter(bc);
  const maxDim = Math.max(bsz.x, bsz.y, bsz.z);
  if (maxDim > 0.01) {
    const s = 1.6 / maxDim;
    obj.scale.set(s, s, s);
  }
  // Центрируем
  box.setFromObject(obj);
  box.getCenter(bc);
  obj.position.sub(bc);

  // Камера — изометрический вид
  const tc = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
  tc.position.set(2.2, 2.0, 2.2);
  tc.lookAt(0, 0, 0);

  tw.render(ts, tc);
  const url = tw.domElement.toDataURL('image/png');
  tw.dispose();
  ts.remove(obj);
  return url;
}

// Кэш миниатюр чтобы не рендерить одно и то же дважды

function getThumb(modelKey) {
  if (!_thumbCache[modelKey]) {

}

// ============================================================
// INPUT HANDLING
// ============================================================
function onCanvasClick(e) {
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();
  const mouseX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  const mouseY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  const mouse = new THREE.Vector2(mouseX, mouseY);

  // Editor mode
  if(editorActive) {
    // GRID MODE
    raycaster.setFromCamera(mouse, camera);

    // ERASE MODE — удалить тайл под курсором
    if(edEraseMode) {
      // Сначала пробуем попасть в 3D тайл (точнее)
      const tileMeshes = tileObjects.filter(o => o.userData.type === 'tile');
      const tHits = raycaster.intersectObjects(tileMeshes, true);
      let eraseR = -1, eraseC = -1;
      for(const h of tHits) {
        let o=h.object; while(o&&!o.userData.row&&o.userData.row!==0) o=o.parent;
        if(o && o.userData.row != null) { eraseR=o.userData.row; eraseC=o.userData.col; break; }
      }
      // Фоллбэк: плоскость
      if(eraseR<0) {
        const gp = new THREE.Plane(new THREE.Vector3(0,1,0),0);
        const pt = new THREE.Vector3();
        raycaster.ray.intersectPlane(gp, pt);
        if(pt) { eraseC=Math.round(pt.x/TILE_SIZE); eraseR=Math.round(pt.z/TILE_SIZE); }
      }
      if(eraseR>=0&&eraseR<GRID_H&&eraseC>=0&&eraseC<GRID_W) {
        // Удаляем: убираем 3D объект из сцены и сбрасываем в данных
        const oldObj = tileMeshGrid[eraseR][eraseC];
        if(oldObj) {
          scene.remove(oldObj);
          tileObjects = tileObjects.filter(o=>o!==oldObj);
          tileMeshGrid[eraseR][eraseC] = null;
        }
        delete edCellData[edKey(eraseR,eraseC)];
        editorGrid[eraseR][eraseC] = TILE_GRASS;
        document.getElementById('ed-info').textContent = `🗑 Удалено [${eraseR},${eraseC}] • продолжай тапать или выйди из режима`;
      }
      return;
    }

    // Также удаляем в свободном режиме
    if(edFreePlaceMode) { handleFreePlaceClick(e); return; }

    const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
    const pt = new THREE.Vector3();
    raycaster.ray.intersectPlane(groundPlane, pt);
    if(pt) {
      const c = Math.round(pt.x / TILE_SIZE);
      const r = Math.round(pt.z / TILE_SIZE);
      if(r>=0&&r<GRID_H&&c>=0&&c<GRID_W) editorPlaceTile(r, c);
    }
    return;
  }

  if (gameState !== 'playing') return;
  
  raycaster.setFromCamera(mouse, camera);
  
  // Check tile hits
  const tileMeshes = tileObjects.filter(o => o.userData.type === 'tile');
  const intersects = raycaster.intersectObjects(tileMeshes, true);
  
  let hitTile = null;
  for (const hit of intersects) {
    let obj = hit.object;
    while (obj && !obj.userData.type) obj = obj.parent;
    if (obj && obj.userData.type === 'tile') { hitTile = obj; break; }
  }
  
  if (hitTile) {
    const { row, col, tileType } = hitTile.userData;
    
    if (selectedTowerType && tileType === TILE_GRASS) {
      placeTower(row, col, selectedTowerType);
      return;
    }
    
    // Check tower click
    const towerHit = towers.find(t => t.row === row && t.col === col);
    if (towerHit) {
      showTowerInfo(towerHit);
      return;
    }
  }
  
  // Check tower model click
  const allMeshes = Object.values(towerMeshes);
  const towerIntersects = raycaster.intersectObjects(allMeshes, true);
  if (towerIntersects.length > 0) {
    let obj = towerIntersects[0].object;
    while (obj && !obj.userData.towerId) obj = obj.parent;
    if (obj) {
      const t = towers.find(t => t.id === obj.userData.towerId);
      if (t) { showTowerInfo(t); return; }
    }
  }
  
  deselectAll();
}

// Editor hover highlight
let edHoverMesh = null;
function updateEditorHover(e) {
  if(!editorActive) return;
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();
  const mouse = new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width) * 2 - 1,
    -((e.clientY - rect.top) / rect.height) * 2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const gp = new THREE.Plane(new THREE.Vector3(0,1,0),0);
  const pt = new THREE.Vector3();
  raycaster.ray.intersectPlane(gp, pt);
  if(!pt) { if(edHoverMesh) edHoverMesh.visible=false; return; }
  const c=Math.round(pt.x/TILE_SIZE), r=Math.round(pt.z/TILE_SIZE);
  if(r<0||r>=GRID_H||c<0||c>=GRID_W) { if(edHoverMesh) edHoverMesh.visible=false; return; }
  if(!edHoverMesh) {
    edHoverMesh = new THREE.Mesh(
      new THREE.BoxGeometry(TILE_SIZE*0.98,0.05,TILE_SIZE*0.98),
      new THREE.MeshBasicMaterial({color:0xf5a623,transparent:true,opacity:0.35})
    );
    edHoverMesh.position.y=0.12;
    addToScene(edHoverMesh);
  }
  // Красный в режиме ластика, оранжевый в обычном
  edHoverMesh.material.color.setHex(edEraseMode ? 0xe74c3c : 0xf5a623);
  edHoverMesh.material.opacity = edEraseMode ? 0.55 : 0.35;
  edHoverMesh.visible = !edFreePlaceMode; // не показываем в свободном режиме
  edHoverMesh.position.set(c*TILE_SIZE, 0.12, r*TILE_SIZE);
}
function onMouseMove(e) {
  if (gameState !== 'playing' || !selectedTowerType) { hideHoverRange(); return; }
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();
  const mouse = new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width) * 2 - 1,
    -((e.clientY - rect.top) / rect.height) * 2 + 1
  );
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(tileObjects.filter(o => o.userData.type === 'tile'), true);
  
  for (const hit of intersects) {
    let obj = hit.object;
    while (obj && !obj.userData.type) obj = obj.parent;
    if (obj && obj.userData.tileType === TILE_GRASS) {
      showHoverRange(obj.userData.row, obj.userData.col, selectedTowerType);
      return;
    }
  }
  hideHoverRange();
}

// Camera drag — supports both ROTATE and PAN modes
let pointers = {};
let isMoving = false;
let camMode = 'rotate'; // 'rotate' | 'pan'

function onPointerDown(e) {
  pointers[e.pointerId] = { x: e.clientX, y: e.clientY };

  // В свободном режиме — сразу проверяем гизмо на pointerdown
  if(edFreePlaceMode && edGizmo && edGizmo.visible && Object.keys(pointers).length === 1) {
    const canvas = document.getElementById('canvas');
    const rect = canvas.getBoundingClientRect();
    const mouseX = ((e.clientX-rect.left)/rect.width)*2-1;
    const mouseY = -((e.clientY-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(new THREE.Vector2(mouseX,mouseY), camera);
    const allGizmoMeshes = [];
    // Только ВИДИМЫЕ группы — иначе невидимые хитбоксы другого режима конфликтуют
    edGizmoArrows.forEach(grp=>{ if(!grp.visible) return; grp.traverse(m=>{if(m.isMesh) allGizmoMeshes.push(m);}); });
    const hits = raycaster.intersectObjects(allGizmoMeshes, false);
    if(hits.length > 0) {
      onGizmoDragStart(e, hits[0].object);
      isMoving = true; // блокируем обычный drag камеры
      return;
    }
  }

  if (Object.keys(pointers).length === 1) {
    isDragging = false;
    dragStart = { x: e.clientX, y: e.clientY };
    isMoving = false;
  }
}

function onPointerMove(e) {
  if (!pointers[e.pointerId]) return;

  // Gizmo drag takes priority
  if(edGizmoDragging) {
    onGizmoDragMove(e);
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    return;
  }

  const keys = Object.keys(pointers);

  if (keys.length === 2) {
    // Pinch zoom
    const otherKey = keys.find(k => parseInt(k) !== parseInt(e.pointerId));
    const other = pointers[otherKey];
    const cur = { x: e.clientX, y: e.clientY };
    const newDist = Math.hypot(cur.x - other.x, cur.y - other.y);
    const oldDist = Math.hypot(pointers[e.pointerId].x - other.x, pointers[e.pointerId].y - other.y);
    if (lastPinchDist > 0) {
      const delta = (oldDist - newDist) * 0.02;
      camDist = Math.max(5, Math.min(35, camDist + delta));
      updateCamera();
    }
    lastPinchDist = newDist;
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    return;
  }

  const dx = e.clientX - pointers[e.pointerId].x;
  const dy = e.clientY - pointers[e.pointerId].y;
  if (Math.abs(dx) + Math.abs(dy) > 4) isMoving = true;

  if (isMoving) {
    if (camMode === 'rotate') {
      camAngle -= dx * 0.005;
      camElevation = Math.max(0.15, Math.min(1.3, camElevation + dy * 0.005));
    } else {
      // PAN: move camTarget in the camera's XZ plane
      const right = new THREE.Vector3();
      const forward = new THREE.Vector3();
      right.crossVectors(camera.getWorldDirection(forward), camera.up).normalize();
      forward.copy(camera.getWorldDirection(new THREE.Vector3()));
      forward.y = 0; forward.normalize();
      right.y = 0; right.normalize();
      const speed = camDist * 0.002;
      camTarget.addScaledVector(right, -dx * speed);
      camTarget.addScaledVector(forward, dy * speed);
    }
    updateCamera();
  }
  pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
}

function onPointerUp(e) {
  if(edGizmoDragging) { onGizmoDragEnd(); delete pointers[e.pointerId]; lastPinchDist=0; return; }
  if (!isMoving && Object.keys(pointers).length === 1) {
    onCanvasClick(e);
  }
  delete pointers[e.pointerId];
  lastPinchDist = 0;
}

function onWheel(e) {
  camDist = Math.max(5, Math.min(35, camDist + e.deltaY * 0.02));
  updateCamera();
}

// ============================================================
// GAME FLOW
// ============================================================
function startGame(mapGrid, customCellData, freeObjsData) {
  grid = mapGrid.map(r => [...r]);
  path = computePath(grid);
  
  // Reset state
  towers = [];
  towerMeshes = {};
  enemies = [];
  projectiles = [];
  particles = [];
  spawnQueue = [];
  gold = 300;
  lives = 20;
  wave = 0;
  waveActive = false;
  gameSpeed = 1;
  selectedTowerType = null;
  selectedTower = null;
  
  // Build 3D map
  buildMap(grid, customCellData || null);
  buildReflection();
  // Загружаем свободно размещённые объекты (декор не на сетке)
  if (freeObjsData && freeObjsData.length > 0) {
    freeObjsData.forEach(fo => {
      const obj = assets.clone(fo.modelKey);
      if (!obj) return;
      // Применяем сохранённый scale (в редакторе scale хранится как число)
      const sc = typeof fo.scale === 'number' ? fo.scale : 1;
      obj.scale.set(sc, sc, sc);
      obj.position.set(fo.pos.x, fo.pos.y, fo.pos.z);
      if (fo.rot) obj.rotation.set(fo.rot.x, fo.rot.y, fo.rot.z);
      obj.traverse(m => { if (m.isMesh) { m.castShadow = true; m.receiveShadow = true; } });
      obj.userData = { freeObj: true, modelKey: fo.modelKey };
      scene.add(obj);
      tileObjects.push(obj); // чтобы попало в отражение
    });
    buildReflection(); // перестроим отражение с учётом freeObjs
  }
  
  // Show game UI
  document.getElementById('main-menu').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('bottom-panel').classList.remove('hidden');
  document.getElementById('game-over-screen').classList.add('hidden');
  document.getElementById('win-screen').classList.add('hidden');
  document.getElementById('cam-mode-btn').classList.remove('hidden');
  camMode = 'rotate';
  document.getElementById('cam-mode-btn').querySelector('img').src = 'assets/icons/ic_cursor.png';
  
  buildBottomPanel();
  // Update panel height CSS var so hud-bottom-right sits above it
  requestAnimationFrame(()=>{
    const p=document.getElementById('bottom-panel');
    if(p){document.documentElement.style.setProperty('--panel-h', p.offsetHeight+'px'); const br=document.getElementById('hud-br'); if(br) br.style.bottom=(p.offsetHeight+14)+'px';}
  });
  updateHUD();
  
  gameState = 'playing';
  updateCamera();
}

function triggerGameOver() {
  gameState = 'gameover';
  document.getElementById('go-info').textContent = `Reached Wave ${wave} of ${TOTAL_WAVES}`;
  document.getElementById('game-over-screen').classList.remove('hidden');
}

function triggerVictory() {
  gameState = 'win';
  document.getElementById('win-info').textContent = `All ${TOTAL_WAVES} waves survived! Gold: 💰${gold}`;
  document.getElementById('win-screen').classList.remove('hidden');
}

function goToMenu() {
  gameState = 'menu';
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('bottom-panel').classList.add('hidden');
  document.getElementById('cam-mode-btn').classList.add('hidden');
  document.getElementById('tower-info').classList.add('hidden'); document.getElementById('tower-info').classList.remove('visible');
  document.getElementById('game-over-screen').classList.add('hidden');
  document.getElementById('win-screen').classList.add('hidden');
  document.getElementById('main-menu').classList.remove('hidden');
  hideTowerInfo();
  deselectAll();
}

// ============================================================
// EVENT LISTENERS
// ============================================================
function setupEvents() {
  const canvas = document.getElementById('canvas');
  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('pointercancel', e => delete pointers[e.pointerId]);
  canvas.addEventListener('wheel', onWheel, { passive: true });
  canvas.addEventListener('mousemove', e => { onMouseMove(e); updateEditorHover(e); });
  
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });
  
  // HUD buttons
  document.getElementById('btn-start-wave').addEventListener('click', startWave);
  
  document.getElementById('cam-mode-btn').addEventListener('click', () => {
    camMode = camMode === 'rotate' ? 'pan' : 'rotate';
    document.getElementById('cam-mode-btn').querySelector('img').src = camMode==='rotate' ? 'assets/icons/ic_cursor.png' : 'assets/icons/ic_refresh.png';
  });
  
  document.getElementById('btn-speed').addEventListener('click', () => {
    gameSpeed = gameSpeed === 1 ? 2 : gameSpeed === 2 ? 3 : 1;
    document.getElementById('speed-txt').textContent = `${gameSpeed}x`;
  });
  
  document.getElementById('btn-exit').addEventListener('click', goToMenu);
  
  // Tower info
  document.getElementById('btn-upgrade').addEventListener('click', () => {
    if (selectedTower) upgradeTower(selectedTower);
  });
  document.getElementById('btn-sell').addEventListener('click', () => {
    if (selectedTower) sellTower(selectedTower);
  });
  document.getElementById('btn-deselect').addEventListener('click', deselectAll);
  
  // Main menu
  document.getElementById('btn-play').addEventListener('click', () => startGame(DEFAULT_MAP, DEFAULT_CELL_DATA, DEFAULT_FREE_OBJS));
  document.getElementById('btn-maps').addEventListener('click', openMyMaps);
  document.getElementById('btn-maps-close').addEventListener('click', () => {
    document.getElementById('my-maps-modal').classList.add('hidden');
  });
  document.getElementById('btn-editor').addEventListener('click', openEditor);
  setupEditorEvents();
  
  // Game over
  document.getElementById('btn-go-retry').addEventListener('click', () => startGame(DEFAULT_MAP, DEFAULT_CELL_DATA, DEFAULT_FREE_OBJS));
  document.getElementById('btn-go-menu').addEventListener('click', goToMenu);
  document.getElementById('btn-win-menu').addEventListener('click', goToMenu);
}

// MY MAPS
// ============================================================
function openMyMaps() {
  const modal = document.getElementById('my-maps-modal');
  const list = document.getElementById('my-maps-list');
  const saved = JSON.parse(localStorage.getItem('td_saved_maps') || '[]');
  
  if(saved.length === 0) {
    list.innerHTML = '<div style="color:#667;text-align:center;padding:20px;">No saved maps yet.<br>Create one in the Map Editor!</div>';
  } else {
    list.innerHTML = '';
    saved.forEach((map, i) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:10px;margin-bottom:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;';
      row.innerHTML = `
        <div style="flex:1">
          <div style="font-weight:700;color:#fff;">${map.name}</div>
          <div style="font-size:0.75rem;color:#556;">${map.date}</div>
        </div>
        <button style="padding:5px 12px;border-radius:4px;border:1.5px solid #f5a623;background:#f5a623;color:#000;font-size:0.8rem;font-weight:700;cursor:pointer;" data-idx="${i}" class="mm-play">▶ Play</button>
        <button style="padding:5px 12px;border-radius:4px;border:1.5px solid #e74c3c;background:transparent;color:#e74c3c;font-size:0.8rem;font-weight:700;cursor:pointer;" data-idx="${i}" class="mm-del">🗑</button>
      `;
      list.appendChild(row);
    });
    list.querySelectorAll('.mm-play').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        const map = saved[idx];
        modal.classList.add('hidden');
        startGame(map.grid, map.cellData || null);
      });
    });
    list.querySelectorAll('.mm-del').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        saved.splice(idx, 1);
        localStorage.setItem('td_saved_maps', JSON.stringify(saved));
        openMyMaps(); // refresh
      });
    });
  }
  modal.classList.remove('hidden');
}

    animal_penguin: 'assets/td/animal-penguin.glb',
    animal_lion: 'assets/td/animal-lion.glb',
    animal_monkey: 'assets/td/animal-monkey.glb',
  });
  
  updateProgress(90, 'Building scene...');
  
  // Copy new assets from kenney kit
  setupEvents();
  
  updateProgress(100, 'Ready!');
  await new Promise(r => setTimeout(r, 500));
  
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('main-menu').classList.remove('hidden');
  
  gameState = 'menu';
  requestAnimationFrame(gameLoop);
}

main().catch(err => {
  console.error('Fatal error:', err);
  document.getElementById('progress-label').textContent = 'Error: ' + err.message;
});
</script>
</body>
</html>
